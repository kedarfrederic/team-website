<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team — Timeline (redesign)</title>
<link rel="stylesheet" href="team_shell.css">
<style>
/* =========================================================================
   TIMELINE — Horizontal calendar-kanban
   =========================================================================
   Structure:
     ┌─ topnav (release switcher + tabs) ──────────────────────────┐
     ├─ chat drawer ┬─ timeline header (days) ──────────────┬─ detail drawer (slides in) ─
     │  Teammate   │  timeline columns (scrollable x)       │  task details
     │             │                                         │
     └─────────────┴────────────────────────────────────────┴───────────────────────────
   ========================================================================= */

.tl-shell {
  display: grid;
  grid-template-columns: 240px 360px 1fr;
  grid-template-rows: 54px 1fr;
  grid-template-areas:
    "side topnav topnav"
    "side chat   timeline";
  height: 100vh;
  min-height: 720px;
  background: var(--bg-canvas);
}
.tl-shell.chat-collapsed {
  grid-template-columns: 240px 58px 1fr;
}
.tl-shell.detail-open {
  grid-template-columns: 240px 320px 1fr 440px;
  grid-template-areas:
    "side topnav topnav topnav"
    "side chat   timeline detail";
}
.tl-shell.detail-open.chat-collapsed {
  grid-template-columns: 240px 58px 1fr 440px;
}

/* ---------- topnav ---------- */
.topnav {
  grid-area: topnav;
  display: flex; align-items: center; gap: 14px;
  padding: 0 22px;
  border-bottom: 1px solid var(--card-border);
  background: var(--bg-canvas);
}
.crumb {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--fg-2);
}
.crumb .slash { color: var(--fg-3); }
.crumb b { color: var(--fg-1); font-weight: 500; }
.release-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 6px;
  background: var(--ink-900);
  color: var(--paper-50);
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
  margin-left: 14px;
}
.release-pill .bar {
  width: 14px; height: 14px; border-radius: 3px;
  background: linear-gradient(180deg, #5E2A20, #E87E2A, #F6C33E);
}
.release-pill .dot { width: 6px; height: 6px; background: var(--lime-500); border-radius: 50%; margin-left: 2px; }

.topnav-tabs { display: inline-flex; gap: 2px; margin-left: 12px; }
.topnav-tab {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  border-radius: 999px;
  background: transparent;
  border: 0;
  font-size: 12.5px;
  color: var(--fg-2);
  cursor: pointer;
  font-weight: 500;
  transition: all var(--dur-fast) var(--ease-out);
}
.topnav-tab:hover { background: var(--row-hover); color: var(--fg-1); }
.topnav-tab.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.topnav-tab svg { opacity: 0.7; }

.topnav-right { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; }
.presence {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 4px;
  border-radius: 999px;
  background: var(--row-hover);
  font-size: 11.5px;
  color: var(--fg-1);
  font-weight: 500;
}
.presence .av-stack { display: inline-flex; }
.presence .av-stack > * + * { margin-left: -6px; }
.mini-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  color: #fff;
  border: 2px solid var(--card-bg);
  letter-spacing: 0.02em;
}

/* ---------- CHAT DRAWER (left column after sidebar) ---------- */
.chat {
  grid-area: chat;
  background: var(--card-bg);
  border-right: 1px solid var(--card-border);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
.chat-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--card-border);
}
.chat-head .tm-badge {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--ink-900);
  display: grid; place-items: center;
  color: var(--lime-500);
  flex: none;
}
.chat-head .who {
  display: flex; flex-direction: column; line-height: 1.15; flex: 1; min-width: 0;
}
.chat-head .who strong { font-size: 13px; font-weight: 500; color: var(--fg-1); }
.chat-head .who span { font-size: 11px; color: var(--fg-3); }
.chat-head .tiny-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 999px;
  background: var(--lime-50);
  color: var(--lime-700);
  border: 1px solid transparent;
}
[data-surface="dark"] .chat-head .tiny-pill { background: rgba(192,236,95,0.1); color: var(--lime-500); }
.chat-head .iconbtn-sm {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: transparent;
  border: 0;
  border-radius: 7px;
  color: var(--fg-3);
  cursor: pointer;
}
.chat-head .iconbtn-sm:hover { background: var(--row-hover); color: var(--fg-1); }

.chat-tabs {
  display: flex; gap: 2px;
  padding: 10px 12px 0;
  border-bottom: 1px solid var(--card-border);
}
.chat-tab {
  padding: 7px 11px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-3);
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.chat-tab:hover { color: var(--fg-1); }
.chat-tab.active {
  color: var(--fg-1);
  border-bottom-color: var(--accent);
}

.chat-scroll {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}

/* User bubble */
.bubble.user {
  align-self: flex-end;
  max-width: 88%;
  background: var(--ink-900);
  color: var(--paper-50);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.45;
  box-shadow: 0 2px 8px -4px rgba(0,0,0,0.25);
}
[data-surface="dark"] .bubble.user { background: var(--paper-100); color: var(--ink-900); }
.bubble.user .at {
  display: block;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  opacity: 0.55;
  letter-spacing: 0.04em;
}

/* Assistant message */
.msg.assistant {
  align-self: flex-start;
  width: 100%;
}
.msg-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.msg-head .label {
  font-size: 12px; color: var(--fg-1); font-weight: 600;
}
.msg-head .at {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
}
.msg-thinking {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
  background: var(--row-hover);
  padding: 5px 9px;
  border-radius: 999px;
  margin-bottom: 8px;
  cursor: pointer;
}
.msg-thinking:hover { color: var(--fg-1); }
.msg-thinking svg { opacity: 0.6; }

.msg-body {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--fg-1);
}

.plan {
  margin-top: 10px;
  display: flex; flex-direction: column; gap: 6px;
  padding: 12px 14px;
  background: var(--row-hover);
  border-radius: 12px;
  border: 1px solid var(--card-border);
}
.plan-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12.5px;
  line-height: 1.35;
  color: var(--fg-1);
}
.plan-row .tick {
  margin-top: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--lime-500);
  color: var(--ink-900);
  display: grid; place-items: center;
  flex: none;
}

.msg-actions {
  margin-top: 10px;
  display: inline-flex; align-items: center; gap: 8px;
}
.changes-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 10px 5px 7px;
  border-radius: 999px;
  background: var(--lime-50);
  border: 1px solid var(--lime-300);
  font-size: 11.5px;
  color: var(--lime-700);
  font-weight: 500;
}
[data-surface="dark"] .changes-pill {
  background: rgba(192,236,95,0.1);
  border-color: rgba(192,236,95,0.2);
  color: var(--lime-500);
}
.changes-pill .count {
  background: var(--lime-500);
  color: var(--ink-900);
  padding: 1px 6px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}
.undo-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  color: var(--fg-2);
  background: transparent;
  border: 1px solid var(--card-border);
  cursor: pointer;
}
.undo-btn:hover { color: var(--fg-1); background: var(--row-hover); }

/* Suggestions (empty state chips) */
.suggestions {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 12px 16px 6px;
}
.suggest {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: var(--row-hover);
  border: 1px solid var(--card-border);
  font-size: 11.5px;
  color: var(--fg-1);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.suggest:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.suggest svg { color: var(--accent); opacity: 0.85; }

/* Composer */
.composer {
  border-top: 1px solid var(--card-border);
  padding: 12px;
  background: var(--card-bg);
}
.composer-inner {
  border: 1px solid var(--card-border);
  background: var(--bg-inset);
  border-radius: 16px;
  padding: 10px 10px 8px;
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
}
[data-surface="light"] .composer-inner { background: var(--paper-100); }
.composer-inner:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.composer textarea {
  width: 100%;
  border: 0; outline: 0;
  background: transparent;
  resize: none;
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.45;
  color: var(--fg-1);
  min-height: 20px;
  padding: 4px 4px 6px;
}
.composer textarea::placeholder { color: var(--fg-3); }
.composer-foot {
  display: flex; align-items: center; gap: 6px;
  padding-top: 4px;
}
.composer-btn {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  background: transparent; border: 0; border-radius: 6px;
  color: var(--fg-3); cursor: pointer;
}
.composer-btn:hover { background: var(--row-hover); color: var(--fg-1); }
.composer-send {
  margin-left: auto;
  width: 28px; height: 28px;
  background: var(--ink-900); color: var(--paper-50);
  border-radius: 8px;
  display: grid; place-items: center;
  border: 0; cursor: pointer;
}
[data-surface="dark"] .composer-send { background: var(--paper-100); color: var(--ink-900); }
.scope-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px 3px 6px;
  border-radius: 999px;
  font-size: 10.5px;
  color: var(--fg-2);
  background: var(--row-hover);
}
.scope-chip .dot { width: 6px; height: 6px; background: var(--ember-500); border-radius: 50%; }

/* Collapsed state */
.chat.collapsed .chat-head,
.chat.collapsed .chat-tabs,
.chat.collapsed .chat-scroll,
.chat.collapsed .suggestions,
.chat.collapsed .composer { display: none; }
.chat.collapsed .rail {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 14px 0;
}
.chat .rail { display: none; }
.chat.collapsed .rail .tm-badge {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--ink-900);
  display: grid; place-items: center;
  color: var(--lime-500);
}
.rail-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-3); cursor: pointer;
}
.rail-btn:hover { background: var(--row-hover); color: var(--fg-1); }

/* ---------- TIMELINE COLUMN AREA ---------- */
.timeline {
  grid-area: timeline;
  overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--bg-canvas);
  position: relative;
}

/* Timeline subheader */
.tl-sub {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 24px 12px;
}
.tl-title {
  font-family: var(--font-sans);
  font-size: 26px;
  letter-spacing: -0.02em;
  font-weight: 500;
  color: var(--fg-1);
  margin: 0;
}
.tl-title .ital {
  font-family: var(--font-highlight);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.tl-controls { margin-left: auto; display: inline-flex; gap: 6px; align-items: center; }

.filter-chips { display: inline-flex; gap: 6px; padding: 0 24px 14px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  font-size: 11.5px;
  color: var(--fg-2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.chip:hover { color: var(--fg-1); }
.chip.on {
  background: var(--ink-900);
  border-color: var(--ink-900);
  color: var(--paper-50);
}
[data-surface="dark"] .chip.on { background: var(--paper-100); color: var(--ink-900); border-color: var(--paper-100); }
.chip .k {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
.chip.on .k { color: rgba(255,255,255,0.6); }
[data-surface="dark"] .chip.on .k { color: rgba(0,0,0,0.4); }

/* The scrolling column surface */
.tl-scroll {
  flex: 1;
  overflow: auto;
  padding: 0 24px 40px;
}
.tl-days {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(200px, 1fr);
  gap: 10px;
  min-width: 100%;
}
.day-col {
  display: flex; flex-direction: column;
  min-width: 0;
}
.day-head {
  display: flex; flex-direction: column; gap: 2px;
  padding: 10px 12px 12px;
  border-top: 1px solid var(--card-border);
  position: sticky; top: 0;
  background: var(--bg-canvas);
  z-index: 2;
}
.day-head.today {
  border-top-color: var(--accent);
  border-top-width: 2px;
}
.day-head .weekday {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.day-head .dayn {
  display: flex; align-items: baseline; gap: 8px;
}
.day-head .dayn .n {
  font-family: var(--font-feature);
  font-size: 32px;
  line-height: 1;
  color: var(--fg-1);
  letter-spacing: -0.01em;
}
.day-head.today .dayn .n { color: var(--accent); }
.day-head .dayn .m {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.day-head.today .todaypill {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  align-self: flex-start;
  font-weight: 500;
}
.day-head.weekend .weekday, .day-head.weekend .dayn .m { color: var(--fg-3); opacity: 0.7; }
.day-head .count-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
  letter-spacing: 0.06em;
  margin-left: auto;
  align-self: flex-start;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--row-hover);
}

.day-list {
  display: flex; flex-direction: column; gap: 8px;
  padding: 10px 4px;
  min-height: 200px;
}

/* Rollout Poster card (anchor) */
.rollout-poster {
  border-radius: 14px;
  padding: 14px 14px 18px;
  background: linear-gradient(155deg, #5E2A20 0%, #8C3A28 55%, #A84A2E 100%);
  color: #F3D5CC;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 6px 24px -12px rgba(0,0,0,0.25);
  min-height: 140px;
}
.rollout-poster::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 85% 15%, rgba(246,195,62,0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 15% 90%, rgba(232,126,42,0.25) 0%, transparent 45%);
  pointer-events: none;
}
.rollout-poster .rp-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.75;
  position: relative;
}
.rollout-poster .rp-title {
  font-family: var(--font-feature);
  font-size: 22px;
  letter-spacing: 0.01em;
  line-height: 1.02;
  text-transform: uppercase;
  margin: 6px 0 10px;
  position: relative;
  color: #F5E6DF;
}
.rollout-poster .rp-release {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 400;
  opacity: 0.9;
  position: relative;
  line-height: 1.3;
}
.rollout-poster .rp-release em {
  font-family: var(--font-highlight);
  font-style: italic;
  font-weight: 400;
  color: #F6C33E;
  display: block;
  font-size: 20px;
  letter-spacing: -0.005em;
  margin-top: 2px;
}

/* Task card — warm paper cards */
.tcard {
  border-radius: 10px;
  padding: 10px 11px 11px;
  cursor: pointer;
  position: relative;
  transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 2px 8px -4px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; gap: 6px;
  --tc-fill: #F6C33E;
  --tc-ink: #3A2906;
  --tc-soft: #FBE59C;
  background: var(--tc-fill);
  color: var(--tc-ink);
  border: 1px solid rgba(0,0,0,0.04);
}
.tcard:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.04), 0 10px 20px -8px rgba(0,0,0,0.18);
}
.tcard.selected {
  box-shadow: 0 0 0 2px var(--accent), 0 10px 20px -8px rgba(0,0,0,0.18);
}
.tcard.done { opacity: 0.62; }
.tcard.done .tc-title { text-decoration: line-through; text-decoration-thickness: 1.2px; }

.tc-head {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}
.tc-status {
  padding: 2px 7px 2px 6px;
  background: rgba(0,0,0,0.12);
  border-radius: 999px;
  color: var(--tc-ink);
  display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600;
}
.tc-status.done { background: rgba(0,0,0,0.22); }
.tc-status.blocked { background: rgba(230,75,64,0.88); color: #fff; }
.tc-status .sdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.tc-budget {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9.5px;
  opacity: 0.72;
  letter-spacing: 0.04em;
}

.tc-title {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  line-height: 1.25;
  color: var(--tc-ink);
  letter-spacing: -0.005em;
}

.tc-dept {
  display: inline-flex;
  padding: 2px 7px;
  background: rgba(0,0,0,0.08);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  width: fit-content;
}

.tc-foot {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.04em;
  opacity: 0.78;
}
.tc-foot .time {
  display: inline-flex; align-items: center; gap: 4px;
}
.tc-foot .subtasks {
  display: inline-flex; align-items: center; gap: 3px;
}
.tc-foot .ass {
  margin-left: auto;
  width: 17px; height: 17px; border-radius: 50%;
  background: rgba(0,0,0,0.18);
  color: var(--tc-ink);
  display: grid; place-items: center;
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.02em;
}
.tc-foot .ass.empty { background: transparent; border: 1px dashed rgba(0,0,0,0.22); color: transparent; }

/* Add task placeholder */
.add-task {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px;
  border: 1px dashed var(--card-border);
  border-radius: 10px;
  color: var(--fg-3);
  font-size: 11.5px;
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  background: transparent;
}
.add-task:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.day-col.weekend .day-list { opacity: 0.75; }

/* Flow ribbon — subtle warm horizontal line at the bottom of timeline (motion cue) */
.flow-ribbon {
  position: absolute;
  left: 24px; right: 24px; bottom: 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--ember-300) 20%,
    var(--ember-500) 50%,
    var(--ember-300) 80%,
    transparent 100%);
  opacity: 0.3;
  pointer-events: none;
}

/* ---------- DETAIL DRAWER (right column) ---------- */
.detail {
  grid-area: detail;
  background: var(--card-bg);
  border-left: 1px solid var(--card-border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  animation: slideIn var(--dur-slow) var(--ease-out);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(16px); }
  to   { opacity: 1; transform: translateX(0); }
}
.detail-head {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--card-border);
}
.detail-head .tm-ic {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--lime-500); color: var(--ink-900);
  display: grid; place-items: center;
  font-weight: 700; font-family: var(--font-mono); font-size: 11px;
}
.detail-head .close {
  margin-left: auto;
  width: 28px; height: 28px; border-radius: 7px;
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-2); cursor: pointer;
}
.detail-head .close:hover { background: var(--row-hover); color: var(--fg-1); }
.detail-head .iconbtn-sm {
  width: 28px; height: 28px; border-radius: 7px;
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-2); cursor: pointer;
}
.detail-head .iconbtn-sm:hover { background: var(--row-hover); color: var(--fg-1); }

.detail-body {
  padding: 18px 20px 28px;
  display: flex; flex-direction: column; gap: 16px;
}

.detail-title {
  font-family: var(--font-sans);
  font-size: 22px;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: var(--fg-1);
  margin: 0;
  font-weight: 500;
}

.detail-tags { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.detail-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--row-hover);
  color: var(--fg-1);
}
.detail-tag.dept-marketing { background: rgba(244,131,62,0.14); color: var(--ember-700); }
[data-surface="dark"] .detail-tag.dept-marketing { color: var(--ember-300); }
.detail-tag.date {
  background: transparent;
  color: var(--fg-2);
  padding: 4px 0;
}
.detail-tag .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.detail-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--card-border);
  margin: 0 -20px;
  padding: 0 20px;
}
.d-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--fg-3);
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
}
.d-tab.active { color: var(--fg-1); border-color: var(--ink-900); font-weight: 500; }
[data-surface="dark"] .d-tab.active { border-color: var(--paper-100); }
.d-tab:hover { color: var(--fg-1); }

.d-row {
  display: grid; grid-template-columns: 2fr 3fr;
  gap: 14px;
  align-items: start;
}
.d-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-3);
  padding-top: 6px;
  display: inline-flex; align-items: center; gap: 6px;
}
.d-label svg { opacity: 0.65; }
.d-value { min-width: 0; font-size: 13px; color: var(--fg-1); padding-top: 4px; }

.picker-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 8px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  font-size: 12px;
  color: var(--fg-1);
  cursor: pointer;
  font-weight: 500;
}
.picker-btn:hover { background: var(--row-hover); }
.picker-btn.status-progress { background: rgba(244,131,62,0.14); border-color: transparent; color: var(--ember-700); }
[data-surface="dark"] .picker-btn.status-progress { color: var(--ember-300); }
.picker-btn.priority-med { background: rgba(246,195,62,0.2); border-color: transparent; color: #8A6907; }
[data-surface="dark"] .picker-btn.priority-med { color: #F6C33E; }
.picker-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.assignee-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px;
  border-radius: 8px;
  cursor: pointer;
}
.assignee-row:hover { background: var(--row-hover); }
.assignee-row .mini-avatar { border: 0; width: 24px; height: 24px; font-size: 10px; }
.assignee-row .n { font-size: 12.5px; color: var(--fg-1); font-weight: 500; }
.assignee-empty {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 11px 5px 7px;
  border: 1px dashed var(--card-border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--fg-3);
  cursor: pointer;
}
.assignee-empty .plus {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--row-hover);
  display: grid; place-items: center;
  color: var(--fg-2);
}

.color-picker { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.color-sw {
  width: 22px; height: 22px; border-radius: 6px;
  cursor: pointer;
  position: relative;
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform var(--dur-fast) var(--ease-out);
}
.color-sw:hover { transform: scale(1.1); }
.color-sw.active::after {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 8px;
  border: 1.5px solid var(--ink-900);
}
[data-surface="dark"] .color-sw.active::after { border-color: var(--paper-100); }

.budget-input {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  background: var(--card-bg);
  font-size: 13px;
  color: var(--fg-1);
  max-width: 160px;
}
.budget-input .dollar { color: var(--fg-3); font-family: var(--font-mono); font-size: 12px; }
.budget-input input {
  border: 0; outline: 0; background: transparent;
  font: inherit; color: inherit;
  width: 100%; font-family: var(--font-mono);
}

.description-block {
  padding: 14px 16px;
  background: var(--row-hover);
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--fg-1);
  border: 1px solid var(--card-border);
}

.deps {
  padding: 12px;
  border-radius: 12px;
  background: var(--row-hover);
  border: 1px solid var(--card-border);
  display: flex; flex-direction: column; gap: 6px;
}
.dep-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  background: var(--card-bg);
  border-radius: 8px;
  font-size: 12px;
  color: var(--fg-1);
}
.dep-row .sw { width: 10px; height: 10px; border-radius: 3px; flex: none; }
.dep-row .at {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-3);
}

/* Sidebar adjustments from Releases (reuse) */
.sidebar { grid-area: side; }

/* Responsive */
@media (max-width: 1200px) {
  .tl-shell { grid-template-columns: 240px 320px 1fr; }
  .tl-shell.detail-open { grid-template-columns: 240px 0 1fr 400px; }
  .tl-shell.detail-open .chat { display: none; }
}
@media (max-width: 900px) {
  .tl-shell { grid-template-columns: 64px 1fr; grid-template-areas: "side topnav" "side timeline"; }
  .tl-shell .chat { display: none; }
  .tl-shell.detail-open { grid-template-columns: 64px 1fr; }
}

      </section>

      {selected && <DetailDrawer task={selected} onClose={() => setSelected(null)}/>}
    </div>
  );
}

function mount() {
  const el = document.getElementById('root');
  if (!el) { setTimeout(mount, 30); return; }
  ReactDOM.createRoot(el).render(<App/>);
}
mount();

</script>
</body>
</html>
