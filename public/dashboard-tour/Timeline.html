<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team — Timeline (redesign)</title>
<link rel="stylesheet" href="team_shell.css">
<style>
/* =========================================================================
   TIMELINE — Horizontal calendar-kanban
   =========================================================================
   Structure:
     ┌─ topnav (release switcher + tabs) ──────────────────────────┐
     ├─ chat drawer ┬─ timeline header (days) ──────────────┬─ detail drawer (slides in) ─
     │  Teammate   │  timeline columns (scrollable x)       │  task details
     │             │                                         │
     └─────────────┴────────────────────────────────────────┴───────────────────────────
   ========================================================================= */

.tl-shell {
  display: grid;
  grid-template-columns: 240px 360px 1fr;
  grid-template-rows: 54px 1fr;
  grid-template-areas:
    "side topnav topnav"
    "side chat   timeline";
  height: 100vh;
  min-height: 720px;
  background: var(--bg-canvas);
}
.tl-shell.chat-collapsed {
  grid-template-columns: 240px 58px 1fr;
}
.tl-shell.detail-open {
  grid-template-columns: 240px 320px 1fr 440px;
  grid-template-areas:
    "side topnav topnav topnav"
    "side chat   timeline detail";
}
.tl-shell.detail-open.chat-collapsed {
  grid-template-columns: 240px 58px 1fr 440px;
}

/* ---------- topnav ---------- */
.topnav {
  grid-area: topnav;
  display: flex; align-items: center; gap: 14px;
  padding: 0 22px;
  border-bottom: 1px solid var(--card-border);
  background: var(--bg-canvas);
}
.crumb {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 12.5px; color: var(--fg-2);
}
.crumb .slash { color: var(--fg-3); }
.crumb b { color: var(--fg-1); font-weight: 500; }
.release-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 6px;
  background: var(--ink-900);
  color: var(--paper-50);
  border-radius: 999px;
  font-size: 12.5px;
  font-weight: 500;
  margin-left: 14px;
}
.release-pill .bar {
  width: 14px; height: 14px; border-radius: 3px;
  background: linear-gradient(180deg, #5E2A20, #E87E2A, #F6C33E);
}
.release-pill .dot { width: 6px; height: 6px; background: var(--lime-500); border-radius: 50%; margin-left: 2px; }

.topnav-tabs { display: inline-flex; gap: 2px; margin-left: 12px; }
.topnav-tab {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 6px 12px;
  border-radius: 999px;
  background: transparent;
  border: 0;
  font-size: 12.5px;
  color: var(--fg-2);
  cursor: pointer;
  font-weight: 500;
  transition: all var(--dur-fast) var(--ease-out);
}
.topnav-tab:hover { background: var(--row-hover); color: var(--fg-1); }
.topnav-tab.active {
  background: var(--accent-soft);
  color: var(--accent);
}
.topnav-tab svg { opacity: 0.7; }

.topnav-right { margin-left: auto; display: inline-flex; align-items: center; gap: 10px; }
.presence {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px 4px 4px;
  border-radius: 999px;
  background: var(--row-hover);
  font-size: 11.5px;
  color: var(--fg-1);
  font-weight: 500;
}
.presence .av-stack { display: inline-flex; }
.presence .av-stack > * + * { margin-left: -6px; }
.mini-avatar {
  width: 22px; height: 22px; border-radius: 50%;
  display: grid; place-items: center;
  font-family: var(--font-mono); font-size: 9px; font-weight: 700;
  color: #fff;
  border: 2px solid var(--card-bg);
  letter-spacing: 0.02em;
}

/* ---------- CHAT DRAWER (left column after sidebar) ---------- */
.chat {
  grid-area: chat;
  background: var(--card-bg);
  border-right: 1px solid var(--card-border);
  display: flex; flex-direction: column;
  overflow: hidden;
  position: relative;
}
.chat-head {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px 12px;
  border-bottom: 1px solid var(--card-border);
}
.chat-head .tm-badge {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--paper-100);
  border: 1px solid var(--card-border);
  display: grid; place-items: center;
  flex: none;
}
.chat-head .who {
  display: flex; flex-direction: column; line-height: 1.15; flex: 1; min-width: 0;
}
.chat-head .who strong { font-size: 13px; font-weight: 500; color: var(--fg-1); }
.chat-head .who span { font-size: 11px; color: var(--fg-3); }
.chat-head .tiny-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  border-radius: 999px;
  background: var(--lime-50);
  color: var(--lime-700);
  border: 1px solid transparent;
}
[data-surface="dark"] .chat-head .tiny-pill { background: rgba(192,236,95,0.1); color: var(--lime-500); }
.chat-head .iconbtn-sm {
  width: 28px; height: 28px;
  display: grid; place-items: center;
  background: transparent;
  border: 0;
  border-radius: 7px;
  color: var(--fg-3);
  cursor: pointer;
}
.chat-head .iconbtn-sm:hover { background: var(--row-hover); color: var(--fg-1); }

.chat-tabs {
  display: flex; gap: 2px;
  padding: 10px 12px 0;
  border-bottom: 1px solid var(--card-border);
}
.chat-tab {
  padding: 7px 11px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--fg-3);
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);
}
.chat-tab:hover { color: var(--fg-1); }
.chat-tab.active {
  color: var(--fg-1);
  border-bottom-color: var(--accent);
}

.chat-scroll {
  flex: 1; overflow-y: auto;
  padding: 16px;
  display: flex; flex-direction: column; gap: 14px;
}

/* User bubble */
.bubble.user {
  align-self: flex-end;
  max-width: 88%;
  background: var(--ink-900);
  color: var(--paper-50);
  border-radius: 16px 16px 4px 16px;
  padding: 10px 14px;
  font-size: 13px;
  line-height: 1.45;
  box-shadow: 0 2px 8px -4px rgba(0,0,0,0.25);
}
[data-surface="dark"] .bubble.user { background: var(--paper-100); color: var(--ink-900); }
.bubble.user .at {
  display: block;
  margin-top: 4px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  opacity: 0.55;
  letter-spacing: 0.04em;
}

/* Assistant message */
.msg.assistant {
  align-self: flex-start;
  width: 100%;
}
.msg-head {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px;
}
.msg-head .label {
  font-size: 12px; color: var(--fg-1); font-weight: 600;
}
.msg-head .at {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.04em;
  color: var(--fg-3);
}
.msg-thinking {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--fg-3);
  background: var(--row-hover);
  padding: 5px 9px;
  border-radius: 999px;
  margin-bottom: 8px;
  cursor: pointer;
}
.msg-thinking:hover { color: var(--fg-1); }
.msg-thinking svg { opacity: 0.6; }

.msg-body {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--fg-1);
}

.plan {
  margin-top: 10px;
  display: flex; flex-direction: column; gap: 6px;
  padding: 12px 14px;
  background: var(--row-hover);
  border-radius: 12px;
  border: 1px solid var(--card-border);
}
.plan-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12.5px;
  line-height: 1.35;
  color: var(--fg-1);
}
.plan-row .tick {
  margin-top: 3px;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: var(--lime-500);
  color: var(--ink-900);
  display: grid; place-items: center;
  flex: none;
}

.msg-actions {
  margin-top: 10px;
  display: inline-flex; align-items: center; gap: 8px;
}
.changes-pill {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 10px 5px 7px;
  border-radius: 999px;
  background: var(--lime-50);
  border: 1px solid var(--lime-300);
  font-size: 11.5px;
  color: var(--lime-700);
  font-weight: 500;
}
[data-surface="dark"] .changes-pill {
  background: rgba(192,236,95,0.1);
  border-color: rgba(192,236,95,0.2);
  color: var(--lime-500);
}
.changes-pill .count {
  background: var(--lime-500);
  color: var(--ink-900);
  padding: 1px 6px;
  border-radius: 999px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
}
.undo-btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 5px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  color: var(--fg-2);
  background: transparent;
  border: 1px solid var(--card-border);
  cursor: pointer;
}
.undo-btn:hover { color: var(--fg-1); background: var(--row-hover); }

/* Suggestions (empty state chips) */
.suggestions {
  display: flex; flex-wrap: wrap; gap: 6px;
  padding: 12px 16px 6px;
}
.suggest {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: var(--row-hover);
  border: 1px solid var(--card-border);
  font-size: 11.5px;
  color: var(--fg-1);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.suggest:hover { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
.suggest svg { color: var(--accent); opacity: 0.85; }

/* Composer */
.composer {
  border-top: 1px solid var(--card-border);
  padding: 12px;
  background: var(--card-bg);
}
.composer-inner {
  border: 1px solid var(--card-border);
  background: var(--bg-inset);
  border-radius: 16px;
  padding: 10px 10px 8px;
  transition: border-color var(--dur-fast) var(--ease-out), box-shadow var(--dur-base) var(--ease-out);
}
[data-surface="light"] .composer-inner { background: var(--paper-100); }
.composer-inner:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.composer textarea {
  width: 100%;
  border: 0; outline: 0;
  background: transparent;
  resize: none;
  font-family: var(--font-sans);
  font-size: 13px;
  line-height: 1.45;
  color: var(--fg-1);
  min-height: 20px;
  padding: 4px 4px 6px;
}
.composer textarea::placeholder { color: var(--fg-3); }
.composer-foot {
  display: flex; align-items: center; gap: 6px;
  padding-top: 4px;
}
.composer-btn {
  width: 26px; height: 26px;
  display: grid; place-items: center;
  background: transparent; border: 0; border-radius: 6px;
  color: var(--fg-3); cursor: pointer;
}
.composer-btn:hover { background: var(--row-hover); color: var(--fg-1); }
.composer-send {
  margin-left: auto;
  width: 28px; height: 28px;
  background: var(--ink-900); color: var(--paper-50);
  border-radius: 8px;
  display: grid; place-items: center;
  border: 0; cursor: pointer;
}
[data-surface="dark"] .composer-send { background: var(--paper-100); color: var(--ink-900); }
.scope-chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 7px 3px 6px;
  border-radius: 999px;
  font-size: 10.5px;
  color: var(--fg-2);
  background: var(--row-hover);
}
.scope-chip .dot { width: 6px; height: 6px; background: var(--ember-500); border-radius: 50%; }

/* Collapsed state */
.chat.collapsed .chat-head,
.chat.collapsed .chat-tabs,
.chat.collapsed .chat-scroll,
.chat.collapsed .suggestions,
.chat.collapsed .composer { display: none; }
.chat.collapsed .rail {
  display: flex; flex-direction: column; align-items: center; gap: 12px;
  padding: 14px 0;
}
.chat .rail { display: none; }
.chat.collapsed .rail .tm-badge {
  width: 34px; height: 34px; border-radius: 10px;
  background: var(--paper-100);
  border: 1px solid var(--card-border);
  display: grid; place-items: center;
}
.rail-btn {
  width: 34px; height: 34px; border-radius: 10px;
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-3); cursor: pointer;
}
.rail-btn:hover { background: var(--row-hover); color: var(--fg-1); }

/* ---------- TIMELINE COLUMN AREA ---------- */
.timeline {
  grid-area: timeline;
  overflow: hidden;
  display: flex; flex-direction: column;
  background: var(--bg-canvas);
  position: relative;
}

/* Timeline subheader */
.tl-sub {
  display: flex; align-items: center; gap: 16px;
  padding: 16px 24px 12px;
}
.tl-title {
  font-family: var(--font-sans);
  font-size: 26px;
  letter-spacing: -0.02em;
  font-weight: 500;
  color: var(--fg-1);
  margin: 0;
}
.tl-title .ital {
  font-family: var(--font-highlight);
  font-style: italic;
  font-weight: 400;
  color: var(--accent);
}
.tl-controls { margin-left: auto; display: inline-flex; gap: 6px; align-items: center; }

.filter-chips { display: inline-flex; gap: 6px; padding: 0 24px 14px; flex-wrap: wrap; }
.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  font-size: 11.5px;
  color: var(--fg-2);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.chip:hover { color: var(--fg-1); }
.chip.on {
  background: var(--ink-900);
  border-color: var(--ink-900);
  color: var(--paper-50);
}
[data-surface="dark"] .chip.on { background: var(--paper-100); color: var(--ink-900); border-color: var(--paper-100); }
.chip .k {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.06em;
  color: var(--fg-3);
}
.chip.on .k { color: rgba(255,255,255,0.6); }
[data-surface="dark"] .chip.on .k { color: rgba(0,0,0,0.4); }

/* The scrolling column surface */
.tl-scroll {
  flex: 1;
  overflow: auto;
  padding: 0 24px 40px;
}
.tl-days {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: minmax(200px, 1fr);
  gap: 10px;
  min-width: 100%;
}
.day-col {
  display: flex; flex-direction: column;
  min-width: 0;
}
.day-head {
  display: flex; flex-direction: column; gap: 2px;
  padding: 10px 12px 12px;
  border-top: 1px solid var(--card-border);
  position: sticky; top: 0;
  background: var(--bg-canvas);
  z-index: 2;
}
.day-head.today {
  border-top-color: var(--accent);
  border-top-width: 2px;
}
.day-head .weekday {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: 0.12em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.day-head .dayn {
  display: flex; align-items: baseline; gap: 8px;
}
.day-head .dayn .n {
  font-family: var(--font-feature);
  font-size: 32px;
  line-height: 1;
  color: var(--fg-1);
  letter-spacing: -0.01em;
}
.day-head.today .dayn .n { color: var(--accent); }
.day-head .dayn .m {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  color: var(--fg-3);
  text-transform: uppercase;
}
.day-head.today .todaypill {
  display: inline-block;
  margin-top: 4px;
  padding: 2px 8px;
  border-radius: 999px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  align-self: flex-start;
  font-weight: 500;
}
.day-head.weekend .weekday, .day-head.weekend .dayn .m { color: var(--fg-3); opacity: 0.7; }
.day-head .count-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
  letter-spacing: 0.06em;
  margin-left: auto;
  align-self: flex-start;
  padding: 2px 7px;
  border-radius: 999px;
  background: var(--row-hover);
}

.day-list {
  display: flex; flex-direction: column; gap: 8px;
  padding: 10px 4px;
  min-height: 200px;
}

/* Rollout Poster card (anchor) */
.rollout-poster {
  border-radius: 14px;
  padding: 14px 14px 18px;
  background: linear-gradient(155deg, #5E2A20 0%, #8C3A28 55%, #A84A2E 100%);
  color: #F3D5CC;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 6px 24px -12px rgba(0,0,0,0.25);
  min-height: 140px;
}
.rollout-poster::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 85% 15%, rgba(246,195,62,0.3) 0%, transparent 45%),
    radial-gradient(ellipse at 15% 90%, rgba(232,126,42,0.25) 0%, transparent 45%);
  pointer-events: none;
}
.rollout-poster .rp-label {
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0.75;
  position: relative;
}
.rollout-poster .rp-title {
  font-family: var(--font-feature);
  font-size: 22px;
  letter-spacing: 0.01em;
  line-height: 1.02;
  text-transform: uppercase;
  margin: 6px 0 10px;
  position: relative;
  color: #F5E6DF;
}
.rollout-poster .rp-release {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 400;
  opacity: 0.9;
  position: relative;
  line-height: 1.3;
}
.rollout-poster .rp-release em {
  font-family: var(--font-highlight);
  font-style: italic;
  font-weight: 400;
  color: #F6C33E;
  display: block;
  font-size: 20px;
  letter-spacing: -0.005em;
  margin-top: 2px;
}

/* Task card — warm paper cards */
.tcard {
  border-radius: 10px;
  padding: 10px 11px 11px;
  cursor: pointer;
  position: relative;
  transition: transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-fast) var(--ease-out);
  box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 2px 8px -4px rgba(0,0,0,0.08);
  display: flex; flex-direction: column; gap: 6px;
  --tc-fill: #F6C33E;
  --tc-ink: #3A2906;
  --tc-soft: #FBE59C;
  background: var(--tc-fill);
  color: var(--tc-ink);
  border: 1px solid rgba(0,0,0,0.04);
}
.tcard:hover {
  transform: translateY(-1px);
  box-shadow: 0 2px 0 rgba(0,0,0,0.04), 0 10px 20px -8px rgba(0,0,0,0.18);
}
.tcard.selected {
  box-shadow: 0 0 0 2px var(--accent), 0 10px 20px -8px rgba(0,0,0,0.18);
}
.tcard.done { opacity: 0.62; }
.tcard.done .tc-title { text-decoration: line-through; text-decoration-thickness: 1.2px; }

.tc-head {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.09em;
  text-transform: uppercase;
}
.tc-status {
  padding: 2px 7px 2px 6px;
  background: rgba(0,0,0,0.12);
  border-radius: 999px;
  color: var(--tc-ink);
  display: inline-flex; align-items: center; gap: 4px;
  font-weight: 600;
}
.tc-status.done { background: rgba(0,0,0,0.22); }
.tc-status.blocked { background: rgba(230,75,64,0.88); color: #fff; }
.tc-status .sdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
.tc-budget {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 9.5px;
  opacity: 0.72;
  letter-spacing: 0.04em;
}

.tc-title {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  line-height: 1.25;
  color: var(--tc-ink);
  letter-spacing: -0.005em;
}

.tc-dept {
  display: inline-flex;
  padding: 2px 7px;
  background: rgba(0,0,0,0.08);
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  font-weight: 600;
  width: fit-content;
}

.tc-foot {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--font-mono);
  font-size: 9.5px;
  letter-spacing: 0.04em;
  opacity: 0.78;
}
.tc-foot .time {
  display: inline-flex; align-items: center; gap: 4px;
}
.tc-foot .subtasks {
  display: inline-flex; align-items: center; gap: 3px;
}
.tc-foot .ass {
  margin-left: auto;
  width: 17px; height: 17px; border-radius: 50%;
  background: rgba(0,0,0,0.18);
  color: var(--tc-ink);
  display: grid; place-items: center;
  font-size: 8.5px; font-weight: 700;
  letter-spacing: 0.02em;
}
.tc-foot .ass.empty { background: transparent; border: 1px dashed rgba(0,0,0,0.22); color: transparent; }

/* Add task placeholder */
.add-task {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px;
  border: 1px dashed var(--card-border);
  border-radius: 10px;
  color: var(--fg-3);
  font-size: 11.5px;
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  background: transparent;
}
.add-task:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-soft);
}
.day-col.weekend .day-list { opacity: 0.75; }

/* Flow ribbon — subtle warm horizontal line at the bottom of timeline (motion cue) */
.flow-ribbon {
  position: absolute;
  left: 24px; right: 24px; bottom: 0;
  height: 2px;
  background: linear-gradient(90deg,
    transparent 0%,
    var(--ember-300) 20%,
    var(--ember-500) 50%,
    var(--ember-300) 80%,
    transparent 100%);
  opacity: 0.3;
  pointer-events: none;
}

/* ---------- DETAIL DRAWER (right column) ---------- */
.detail {
  grid-area: detail;
  background: var(--card-bg);
  border-left: 1px solid var(--card-border);
  display: flex; flex-direction: column;
  overflow-y: auto;
  animation: slideIn var(--dur-slow) var(--ease-out);
}
@keyframes slideIn {
  from { opacity: 0; transform: translateX(16px); }
  to   { opacity: 1; transform: translateX(0); }
}
.detail-head {
  display: flex; align-items: center; gap: 8px;
  padding: 14px 18px 12px;
  border-bottom: 1px solid var(--card-border);
}
.detail-head .tm-ic {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--lime-500); color: var(--ink-900);
  display: grid; place-items: center;
  font-weight: 700; font-family: var(--font-mono); font-size: 11px;
}
.detail-head .close {
  margin-left: auto;
  width: 28px; height: 28px; border-radius: 7px;
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-2); cursor: pointer;
}
.detail-head .close:hover { background: var(--row-hover); color: var(--fg-1); }
.detail-head .iconbtn-sm {
  width: 28px; height: 28px; border-radius: 7px;
  background: transparent; border: 0;
  display: grid; place-items: center;
  color: var(--fg-2); cursor: pointer;
}
.detail-head .iconbtn-sm:hover { background: var(--row-hover); color: var(--fg-1); }

.detail-body {
  padding: 18px 20px 28px;
  display: flex; flex-direction: column; gap: 16px;
}

.detail-title {
  font-family: var(--font-sans);
  font-size: 22px;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: var(--fg-1);
  margin: 0;
  font-weight: 500;
}

.detail-tags { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.detail-tag {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 4px 9px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  background: var(--row-hover);
  color: var(--fg-1);
}
.detail-tag.dept-marketing { background: rgba(244,131,62,0.14); color: var(--ember-700); }
[data-surface="dark"] .detail-tag.dept-marketing { color: var(--ember-300); }
.detail-tag.date {
  background: transparent;
  color: var(--fg-2);
  padding: 4px 0;
}
.detail-tag .tag-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.detail-tabs {
  display: flex; gap: 0;
  border-bottom: 1px solid var(--card-border);
  margin: 0 -20px;
  padding: 0 20px;
}
.d-tab {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 12px;
  font-size: 12px;
  color: var(--fg-3);
  background: transparent;
  border: 0;
  border-bottom: 2px solid transparent;
  cursor: pointer;
}
.d-tab.active { color: var(--fg-1); border-color: var(--ink-900); font-weight: 500; }
[data-surface="dark"] .d-tab.active { border-color: var(--paper-100); }
.d-tab:hover { color: var(--fg-1); }

.d-row {
  display: grid; grid-template-columns: 2fr 3fr;
  gap: 14px;
  align-items: start;
}
.d-label {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--fg-3);
  padding-top: 6px;
  display: inline-flex; align-items: center; gap: 6px;
}
.d-label svg { opacity: 0.65; }
.d-value { min-width: 0; font-size: 13px; color: var(--fg-1); padding-top: 4px; }

.picker-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 10px 5px 8px;
  border-radius: 999px;
  border: 1px solid var(--card-border);
  background: var(--card-bg);
  font-size: 12px;
  color: var(--fg-1);
  cursor: pointer;
  font-weight: 500;
}
.picker-btn:hover { background: var(--row-hover); }
.picker-btn.status-progress { background: rgba(244,131,62,0.14); border-color: transparent; color: var(--ember-700); }
[data-surface="dark"] .picker-btn.status-progress { color: var(--ember-300); }
.picker-btn.priority-med { background: rgba(246,195,62,0.2); border-color: transparent; color: #8A6907; }
[data-surface="dark"] .picker-btn.priority-med { color: #F6C33E; }
.picker-btn .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

.assignee-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px;
  border-radius: 8px;
  cursor: pointer;
}
.assignee-row:hover { background: var(--row-hover); }
.assignee-row .mini-avatar { border: 0; width: 24px; height: 24px; font-size: 10px; }
.assignee-row .n { font-size: 12.5px; color: var(--fg-1); font-weight: 500; }
.assignee-empty {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 5px 11px 5px 7px;
  border: 1px dashed var(--card-border);
  border-radius: 999px;
  font-size: 12px;
  color: var(--fg-3);
  cursor: pointer;
}
.assignee-empty .plus {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--row-hover);
  display: grid; place-items: center;
  color: var(--fg-2);
}

.color-picker { display: inline-flex; gap: 6px; flex-wrap: wrap; }
.color-sw {
  width: 22px; height: 22px; border-radius: 6px;
  cursor: pointer;
  position: relative;
  border: 1px solid rgba(0,0,0,0.06);
  transition: transform var(--dur-fast) var(--ease-out);
}
.color-sw:hover { transform: scale(1.1); }
.color-sw.active::after {
  content: '';
  position: absolute; inset: -3px;
  border-radius: 8px;
  border: 1.5px solid var(--ink-900);
}
[data-surface="dark"] .color-sw.active::after { border-color: var(--paper-100); }

.budget-input {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  border: 1px solid var(--card-border);
  border-radius: 10px;
  background: var(--card-bg);
  font-size: 13px;
  color: var(--fg-1);
  max-width: 160px;
}
.budget-input .dollar { color: var(--fg-3); font-family: var(--font-mono); font-size: 12px; }
.budget-input input {
  border: 0; outline: 0; background: transparent;
  font: inherit; color: inherit;
  width: 100%; font-family: var(--font-mono);
}

.description-block {
  padding: 14px 16px;
  background: var(--row-hover);
  border-radius: 12px;
  font-size: 13px;
  line-height: 1.55;
  color: var(--fg-1);
  border: 1px solid var(--card-border);
}

.deps {
  padding: 12px;
  border-radius: 12px;
  background: var(--row-hover);
  border: 1px solid var(--card-border);
  display: flex; flex-direction: column; gap: 6px;
}
.dep-row {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 8px;
  background: var(--card-bg);
  border-radius: 8px;
  font-size: 12px;
  color: var(--fg-1);
}
.dep-row .sw { width: 10px; height: 10px; border-radius: 3px; flex: none; }
.dep-row .at {
  margin-left: auto;
  font-family: var(--font-mono);
  font-size: 10.5px;
  color: var(--fg-3);
}

/* Sidebar adjustments from Releases (reuse) */
.sidebar { grid-area: side; }

/* Responsive */
@media (max-width: 1200px) {
  .tl-shell { grid-template-columns: 240px 320px 1fr; }
  .tl-shell.detail-open { grid-template-columns: 240px 0 1fr 400px; }
  .tl-shell.detail-open .chat { display: none; }
}
@media (max-width: 900px) {
  .tl-shell { grid-template-columns: 64px 1fr; grid-template-areas: "side topnav" "side timeline"; }
  .tl-shell .chat { display: none; }
  .tl-shell.detail-open { grid-template-columns: 64px 1fr; }
}

/* ---------- LIVE chat animations (Late Reply demo) ---------- */
@keyframes nh-msg-in {
  from { opacity: 0; transform: translateY(8px); }
  to   { opacity: 1; transform: translateY(0); }
}
.nh-msg-in {
  animation: nh-msg-in 0.32s ease-out both;
}
.nh-thinking-row {
  opacity: 0.92;
}
.nh-thinking-active {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-style: italic;
  color: var(--fg-2);
  padding: 6px 10px;
  background: rgba(192, 236, 95, 0.06);
  border: 1px dashed rgba(192, 236, 95, 0.35);
  border-radius: 999px;
}
.nh-thinking-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--lime-500);
  animation: nh-bounce 1.05s ease-in-out infinite;
}
.nh-thinking-dot:nth-child(2) { animation-delay: 0.18s; }
.nh-thinking-dot:nth-child(3) { animation-delay: 0.36s; }
@keyframes nh-bounce {
  0%,80%,100% { transform: translateY(0);   opacity: 0.45; }
  40%         { transform: translateY(-3px); opacity: 1;    }
}

/* ---------- TASK reveal + active-status pulse ---------- */
@keyframes nh-card-in {
  from { opacity: 0; transform: translateY(6px) scale(0.985); }
  to   { opacity: 1; transform: translateY(0)   scale(1);     }
}
.tcard {
  animation: nh-card-in 0.45s ease-out both;
  /* per-card stagger via nth-child within a column */
  animation-delay: calc(var(--tc-i, 0) * 60ms + 120ms);
}
.tcard:nth-of-type(2) { --tc-i: 1; }
.tcard:nth-of-type(3) { --tc-i: 2; }
.tcard:nth-of-type(4) { --tc-i: 3; }
.tcard:nth-of-type(5) { --tc-i: 4; }

/* Subtle pulse on Active tasks so the timeline reads "live". Done tasks stay
   quiet, Blocked uses a stronger ring color, Active tasks breathe. */
.tcard:not(.done):not(.blocked-card) {
  animation: nh-card-in 0.45s ease-out both, nh-active-pulse 4.2s ease-in-out 0.8s infinite;
}
@keyframes nh-active-pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(192, 236, 95, 0); }
  50%     { box-shadow: 0 0 0 4px rgba(192, 236, 95, 0.12); }
}

/* Honor reduced-motion preference: kill all the demo motion. */
@media (prefers-reduced-motion: reduce) {
  .nh-msg-in, .tcard, .nh-thinking-dot { animation: none !important; }
  .tcard:not(.done):not(.blocked-card) { animation: none !important; }
}

function TaskCard({ t, selected, onClick }) {
  const c = TASK_COLORS[t.color];
  const style = { '--tc-fill': c.fill, '--tc-ink': c.ink, '--tc-soft': c.soft };
  const cls = 'tcard ' + (t.status==='Done'?'done':'') + ' ' + (selected?'selected':'');
  return (
    <div className={cls} style={style} onClick={onClick}>
      <div className="tc-head">
        <span className={'tc-status ' + (t.status==='Done'?'done':'') + ' ' + (t.status==='Blocked'?'blocked':'')}>
          <span className="sdot"/>{t.status.toUpperCase()}

        {t.budget && <span className="tc-budget">${t.budget.toLocaleString()}</span>}

      <div className="tc-title">{t.title}</div>
      <span className="tc-dept">{t.dept}</span>

  // "thinking" phase first (animated pulse + label) for ~1.6s, then resolves
  // to the full body. Times use the visitor's local clock so the timestamps
  // feel current. The drawer auto-scrolls to the latest message after each
  // append. Stops once LIVE_FEED is exhausted (no infinite spam).
  const [messages, setMessages] = useState(CHAT_HISTORY);
  const [thinking, setThinking] = useState(null); // {idx, at} while composing
  const scrollRef = useRef(null);

  useEffect(() => {
    let feedIdx = 0;
    let cancelled = false;

    const formatTime = () => {
      const d = new Date();
      let h = d.getHours();
      const m = d.getMinutes().toString().padStart(2, '0');
      const ampm = h >= 12 ? 'PM' : 'AM';
      h = h % 12 || 12;
      return `${h}:${m} ${ampm}`;
    };

    const tick = () => {
      if (cancelled || feedIdx >= LIVE_FEED.length) return;
      const next = LIVE_FEED[feedIdx++];
      const id = 'live-' + feedIdx;
      const at = formatTime();

      // Phase 1 — thinking indicator
      setThinking({ id, at, label: next.thinking });

      setTimeout(() => {
        if (cancelled) return;
        // Phase 2 — replace thinking with full message
        setThinking(null);
        setMessages(prev => prev.concat({
          id, role: 'assistant', at,
          thinking: next.thinking,
          content: next.content,
        }));
      }, 1700);

      // Schedule next message
      setTimeout(tick, 14000);
    };

    // Start the loop after the initial timeline reveal settles.
    const startTimer = setTimeout(tick, 4500);
    return () => { cancelled = true; clearTimeout(startTimer); };
  }, []);

  // Auto-scroll the chat to the newest message on append.
  useEffect(() => {
    if (!scrollRef.current) return;
    scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages, thinking]);

  return (
    <aside className={'chat ' + (collapsed ? 'collapsed' : '')}>
      <div className="rail">
        <div className="tm-badge"><TeamLogomark size={20}/></div>
        <button className="rail-btn" onClick={() => setCollapsed(false)} title="Open Teammate"><Icon.Discs size={16}/></button>
        <button className="rail-btn"><Icon.Pulse size={16}/></button>
      </div>

      <div className="chat-head">
        <div className="tm-badge"><TeamLogomark size={18}/></div>
        <div className="who">
          <strong>Teammate</strong>
          <span>AI Assistant · Late Reply</span>
        </div>
        <span className="tiny-pill">Ready</span>
        <button className="iconbtn-sm" onClick={() => setCollapsed(true)} title="Collapse">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="m15 6-6 6 6 6"/></svg>
        </button>
      </div>

      <div className="chat-tabs">
        <button className="chat-tab active">Now</button>
        <button className="chat-tab">History</button>
        <button className="chat-tab">Docs</button>
      </div>

      <div className="chat-scroll" ref={scrollRef}>
        {messages.map(m => m.role === 'user' ? (
          <div key={m.id} className="bubble user">
            {m.content}
            <span className="at">{m.at}</span>
          </div>
        ) : (
          <div key={m.id} className="msg assistant nh-msg-in">
            <div className="msg-head">
              <span className="label">Teammate</span>
              <span className="at">{m.at}</span>
            </div>
            {m.thinking && (
              <div className="msg-thinking">
                <Icon.Pulse size={10}/>
                {m.id && m.id.indexOf('live-') === 0 ? m.thinking : 'View full response'}
              </div>
            )}
            <div className="msg-body">{m.content}</div>
            {m.plan && (
              <div className="plan">
                {m.plan.map((p,i) => (
                  <div key={i} className="plan-row">
                    <span className="tick"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m2 5 2 2 4-4"/></svg></span>
                    <span>{p.label}</span>
                  </div>
                ))}
              </div>
            )}
            {m.changes && (
              <div className="msg-actions">
                <span className="changes-pill">
                  <span className="count">{m.changes.count}</span>
                  {m.changes.label}
                </span>
                <button className="undo-btn">
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 14l-4-4 4-4"/><path d="M5 10h10a4 4 0 0 1 0 8h-2"/></svg>
                  Undo
                </button>
              </div>
            )}
          </div>
        ))}
        {thinking && (
          <div key={thinking.id} className="msg assistant nh-thinking-row">
            <div className="msg-head">
              <span className="label">Teammate</span>
              <span className="at">{thinking.at}</span>
            </div>
            <div className="msg-thinking nh-thinking-active">
              <span className="nh-thinking-dot"/>
              <span className="nh-thinking-dot"/>
              <span className="nh-thinking-dot"/>
              <span style={{marginLeft:8}}>{thinking.label}</span>
            </div>
          </div>
        )}
      </div>

      <div className="suggestions">
        <button className="suggest"><Icon.Calendar size={11}/>What's critical this week?</button>
        <button className="suggest"><Icon.Stack size={11}/>Find unassigned tasks</button>
      </div>

      <div className="composer">
        <div className="composer-inner">
          <textarea placeholder="Ask Teammate anything about this release…" rows="2"/>
          <div className="composer-foot">
            <button className="composer-btn" title="Attach">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M21 11.5 12 20a5 5 0 0 1-7-7l9-9a3.5 3.5 0 0 1 5 5L10 17a2 2 0 0 1-3-3l8-8"/></svg>
            </button>
            <span className="scope-chip"><span className="dot"/>Late Reply</span>
            <button className="composer-send">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            </button>
          </div>
        </div>
      </div>
    </aside>
  );
}

function DayColumn({ day, tasks, selectedId, onSelect }) {
  return (
    <div className={'day-col ' + (day.isWeekend ? 'weekend' : '')}>
      <div className={'day-head ' + (day.today?'today':'') + ' ' + (day.isWeekend?'weekend':'')}>
        <div className="weekday">{day.weekday}</div>
        <div className="dayn">
          <span className="n">{day.day}</span>
          <span className="m">{day.month}</span>
        </div>
        {day.today && <span className="todaypill">Today</span>}
        {!day.today && tasks.length > 0 && <span className="count-pill">{tasks.length}</span>}
      </div>
      <div className="day-list">
        {day.today && (
          <div className="rollout-poster">
            <div className="rp-label">Rollout Plan</div>
            <div className="rp-title">Late Reply</div>
            <div className="rp-release">3shades <em>— May 22</em></div>
          </div>
        )}
        {tasks.map(t => <TaskCard key={t.id} t={t} selected={selectedId===t.id} onClick={() => onSelect(t)}/>)}
        <button className="add-task">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Add Task
        </button>
      </div>
    </div>
  );
}

function DetailDrawer({ task, onClose }) {
  if (!task) return null;
  const c = TASK_COLORS[task.color];
  return (
    <aside className="detail">
      <div className="detail-head">
        <button className="iconbtn-sm" onClick={onClose} title="Close">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <div className="tm-ic">ML</div>
        <button className="iconbtn-sm"><Icon.Star size={14}/></button>
        <button className="iconbtn-sm" title="Delete">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M6 6l1 14a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-14"/></svg>
        </button>
      </div>

      <div className="detail-body">
        <h2 className="detail-title">{task.title}</h2>

        <div className="detail-tags">
          <span className="detail-tag dept-marketing">
            <span className="tag-dot"/>{task.dept}
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </span>
          <span className="detail-tag">
            <Icon.Calendar size={10}/> No dept
            <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
          </span>
          <span className="detail-tag date"><Icon.Calendar size={10}/> Apr 19, 2026</span>
        </div>

        <div className="detail-tabs">
          <button className="d-tab active">Details</button>
          <button className="d-tab">Strategy</button>
          <button className="d-tab">Subtasks</button>
          <button className="d-tab">Assets</button>
          <button className="d-tab">Links</button>
          <button className="d-tab">Chat</button>
        </div>

        <div className="d-row">
          <span className="d-label">Status</span>
          <div className="d-value">
            <button className="picker-btn status-progress"><span className="dot"/>{task.status}
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
          </div>
        </div>

        <div className="d-row">
          <span className="d-label">Priority</span>
          <div className="d-value">
            <button className="picker-btn priority-med"><span className="dot"/>{task.priority}
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>
            </button>
          </div>
        </div>

        <div className="d-row">
          <span className="d-label"><Icon.Person size={11}/> Assignees</span>
          <div className="d-value">
            {task.assignee ? (
              <div className="assignee-row"><span className="mini-avatar" style={{background:'#A2321E'}}>{task.assignee}</span><span className="n">{ASSIGNEE_NAMES[task.assignee] || '3shades team'}</span></div>
            ) : (
              <button className="assignee-empty"><span className="plus"><Icon.Plus size={10}/></span>Assign team members</button>
            )}
          </div>
        </div>

        <div className="d-row">
          <span className="d-label">Task Color</span>
          <div className="d-value">
            <div className="color-picker">
              {Object.entries(TASK_COLORS).map(([k,v]) => (
                <div key={k} className={'color-sw ' + (k===task.color?'active':'')} style={{background:v.fill}} title={v.label}/>
              ))}
            </div>
          </div>
        </div>

        <div className="d-row">
          <span className="d-label">$  Budget</span>
          <div className="d-value">
            <div className="budget-input"><span className="dollar">$</span><input defaultValue={task.budget || 0}/></div>
          </div>
        </div>

        <div className="d-row">
          <span className="d-label"><Icon.Calendar size={11}/> Due Date</span>
          <div className="d-value" style={{fontSize:13, fontWeight:500}}>{DAY_DUE_DATES[task.day] || 'Friday, May 22, 2026'}</div>
        </div>

        <div>
          <span className="d-label" style={{display:'block',marginBottom:8}}>Description</span>
          <div className="description-block">
            {TASK_DESCRIPTIONS[task.id] || 'Operational task in the Late Reply rollout. Owner is responsible for execution and reporting outcomes back to the rollout thread.'}
          </div>
        </div>
      </div>
    </aside>
  );
}

function App() {
  const [collapsed, setCollapsed] = useState(false);
  const [selected, setSelected] = useState(null);

  useEffect(() => { document.documentElement.setAttribute('data-surface', 'light'); }, []);

  const shellClass = 'tl-shell ' + (collapsed?'chat-collapsed':'') + ' ' + (selected?'detail-open':'');
  return (
    <div className={shellClass}>
      <Sidebar/>

      <div className="topnav">
        <div className="crumb">
          <Icon.Stack size={13}/><span>Home</span>
          <span className="slash">/</span><span>Late Reply</span>
          <span className="slash">/</span><b>Timeline</b>
        </div>
        <span className="release-pill">
          <span className="bar"/>Late Reply Tim…
          <span className="dot"/>
        </span>
        <nav className="topnav-tabs">
          <button className="topnav-tab"><Icon.Stack size={12}/>Assets</button>
          <button className="topnav-tab"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 2v20M5 8h7M7 14h5"/></svg>Budget</button>
          <button className="topnav-tab active"><Icon.Pulse size={12}/>Intelligence</button>
        </nav>
        <div className="topnav-right">
          <span className="presence">
            <span className="av-stack">
              <span className="mini-avatar" style={{background:'#E87E2A'}}>SC</span>
            </span>
            1 online
          </span>
          <button className="iconbtn"><Icon.Sun/></button>
          <button className="btn primary"><Icon.Plus size={12}/>Share</button>
        </div>
      </div>

      <ChatDrawer collapsed={collapsed} setCollapsed={setCollapsed}/>

      <section className="timeline">
        <div className="tl-sub">
          <h1 className="tl-title">Timeline <span className="ital">— this week</span></h1>
          <div className="tl-controls">
            <button className="iconbtn"><Icon.Filter size={13}/></button>
            <button className="iconbtn"><Icon.Sliders size={13}/></button>
          </div>
        </div>

        <div className="filter-chips">
          <span className="chip on">Show Subtasks</span>
          <span className="chip">Today <span className="k">T</span></span>
          <span className="chip">Apr 5</span>
          <span className="chip">Milestone</span>
          <span className="chip">Stacks</span>
        </div>

        <div className="tl-scroll">
          <div className="tl-days">
            {DAYS.map(d => {
              const dayTasks = TASKS.filter(t => t.day === d.id);
              return <DayColumn key={d.id} day={d} tasks={dayTasks}
                selectedId={selected?.id} onSelect={setSelected}/>;
            })}
          </div>
        </div>

        <div className="flow-ribbon"/>
      </section>

      {selected && <DetailDrawer task={selected} onClose={() => setSelected(null)}/>}
    </div>
  );
}

function mount() {
  const el = document.getElementById('root');
  if (!el) { setTimeout(mount, 30); return; }
  ReactDOM.createRoot(el).render(<App/>);
}
mount();

</script>
</body>
</html>
