<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Team — Memory graph</title>
<style>
/* =========================================================================
   Team Design System — Colors & Type
   =========================================================================
   Brand: Team (Team Rollouts, Inc.)
   A platform for the music industry to manage releases and rollouts.
   ========================================================================= */

/* ---------- Fonts ----------
   Primary:   Inter — workhorse UI sans. Used for body, headlines,
              buttons, labels. Weights 300/400/500/600/700.
   Secondary: Montserrat — used for display moments, editorial
              emphasis, occasional headlines. Italics carry the
              signature "highlighter" role (the word the headline
              leans on). Weights 400/500/600/700 + italics.
   Feature:   Special Gothic Expanded One — occasional display face
              for hero moments, posters, merch-style type. Used
              SPARINGLY — one hit per screen, max.
   Mono:      JetBrains Mono — labels, timestamps, tags, data,
              footnotes, system messages. */

@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Special+Gothic+Expanded+One&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap');

:root {
  /* =========================================================================
     COLORS — Core palette
     ========================================================================= */

  /* --- Ink (near-blacks, our primary canvas) --- */
  --ink-900: #0E0E10;   /* darkest — app chrome, deep backgrounds */
  --ink-800: #17171A;   /* default dark bg (matches social posts) */
  --ink-700: #1E1E22;   /* raised surface on dark */
  --ink-600: #2A2A30;   /* card border / divider on dark */
  --ink-500: #3A3A42;   /* muted border */

  /* --- Paper (near-whites, inverted canvas) --- */
  --paper-50:  #FFFFFF; /* pure white — light canvas */
  --paper-100: #FAFAF7; /* warm off-white — preferred light bg */
  --paper-200: #F2F1EC; /* subtle tint — inset panels */
  --paper-300: #E6E4DC; /* border / divider on light */
  --paper-400: #CFCCC1; /* muted stroke */

  /* --- Lime (signature accent — only used at small doses) --- */
  --lime-50:   #F2FBDC;
  --lime-100:  #E4F5B0;
  --lime-300:  #CAEC73;
  --lime-500:  #C0EC5F;   /* PRIMARY accent — "REALITY" pill, highlights */
  --lime-600:  #A8D84A;
  --lime-700:  #7FA830;

  /* --- Ember (logomark gradient stack — warm, signature) --- */
  --ember-950: #3B0F08;   /* deepest maroon (logo stripe 1) */
  --ember-900: #5A1710;
  --ember-800: #8C1F13;
  --ember-700: #BF2A14;
  --ember-600: #E83E18;   /* iconic red-orange (logo stripe 4) */
  --ember-500: #F25A22;
  --ember-400: #F4833E;
  --ember-300: #F2A56B;
  --ember-200: #E8C4A0;
  --ember-100: #DCD1C5;   /* palest sand (logo stripe 7) */

  /* --- Semantic signals --- */
  --signal-live:    #C0EC5F; /* release live / success */
  --signal-due:     #F4833E; /* due soon / warning */
  --signal-late:    #E83E18; /* overdue / error */
  --signal-hold:    #8A8A94; /* paused / neutral */

  /* =========================================================================
     SEMANTIC — FOREGROUND (dark mode is the default canvas)
     ========================================================================= */
  --fg-1: var(--paper-100);          /* primary text on dark */
  --fg-2: #B8B6AE;                   /* secondary — captions, meta */
  --fg-3: #7A7770;                   /* tertiary — timestamps, hints */
  --fg-inverse: var(--ink-900);      /* text on light surfaces / lime pills */
  --fg-accent: var(--lime-500);
  --fg-brand:  var(--ember-600);
  --fg-link:   var(--lime-500);

  /* =========================================================================
     SEMANTIC — BACKGROUND
     ========================================================================= */
  --bg-canvas:   var(--ink-800);     /* the Team canvas — warm near-black */
  --bg-surface:  var(--ink-700);     /* cards, panels */
  --bg-raised:   var(--ink-600);     /* dropdowns, modals */
  --bg-inverse:  var(--paper-100);   /* light canvas pages */
  --bg-inset:    #121214;

  /* Border & divider */
  --border-hair:    rgba(255,255,255,0.06);
  --border-default: rgba(255,255,255,0.10);
  --border-strong:  rgba(255,255,255,0.18);
  --border-focus:   var(--lime-500);

  /* =========================================================================
     RADII — soft but not cute. Pills for CTAs.
     ========================================================================= */
  --radius-xs:   4px;
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --radius-xl:   20px;
  --radius-pill: 999px;

  /* =========================================================================
     SPACING — 4px base
     ========================================================================= */
  --space-1:  4px;
  --space-2:  8px;
  --space-3:  12px;
  --space-4:  16px;
  --space-5:  20px;
  --space-6:  24px;
  --space-8:  32px;
  --space-10: 40px;
  --space-12: 48px;
  --space-16: 64px;
  --space-20: 80px;
  --space-24: 96px;

  /* =========================================================================
     SHADOWS — restrained. Mostly we use borders.
     ========================================================================= */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.30);
  --shadow-md: 0 8px 24px -8px rgba(0,0,0,0.45);
  --shadow-lg: 0 24px 48px -12px rgba(0,0,0,0.55);
  --shadow-glow-lime: 0 0 0 3px rgba(192,236,95,0.25);

  /* =========================================================================
     TYPE — Families
     ========================================================================= */
  --font-sans:      'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-secondary: 'Montserrat', 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-feature:   'Special Gothic Expanded One', 'Montserrat', 'Inter', sans-serif;
  --font-highlight: 'Instrument Serif', 'Playfair Display', Georgia, serif; /* italic-only, for the "highlighter" word */
  --font-display:   'Special Gothic Expanded One', 'Montserrat', 'Inter', sans-serif; /* legacy alias */
  --font-mono:      'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, monospace;

  /* Type scale (px) */
  --fs-xs:   12px;
  --fs-sm:   14px;
  --fs-base: 16px;
  --fs-md:   18px;
  --fs-lg:   20px;
  --fs-xl:   24px;
  --fs-2xl:  32px;
  --fs-3xl:  40px;
  --fs-4xl:  56px;
  --fs-5xl:  72px;
  --fs-6xl:  96px;

  /* Line heights */
  --lh-tight:   1.05;
  --lh-snug:    1.2;
  --lh-normal:  1.45;
  --lh-relaxed: 1.6;

  /* Letter spacing — mono labels get +tracking when uppercased */
  --tracking-tight:  -0.02em;
  --tracking-normal: 0;
  --tracking-wide:   0.08em;
  --tracking-mono:   0.04em;

  /* =========================================================================
     MOTION
     ========================================================================= */
  --ease-out:     cubic-bezier(0.2, 0.8, 0.2, 1);
  --ease-in-out:  cubic-bezier(0.6, 0, 0.2, 1);
  --dur-fast:     120ms;
  --dur-base:     200ms;
  --dur-slow:     400ms;
}

/* =========================================================================
   LIGHT SURFACE OVERRIDE
   Apply to anything that should sit on paper instead of ink.
   ========================================================================= */
[data-surface="light"] {
  --bg-canvas:  var(--paper-100);
  --bg-surface: var(--paper-50);
  --bg-raised:  var(--paper-50);
  --bg-inset:   var(--paper-200);
  --fg-1: var(--ink-900);
  --fg-2: #4A4842;
  --fg-3: #8A8780;
  --border-hair:    rgba(14,14,16,0.05);
  --border-default: rgba(14,14,16,0.10);
  --border-strong:  rgba(14,14,16,0.18);
}

/* =========================================================================
   SEMANTIC TYPE — composed styles
   ========================================================================= */

/* Display — editorial hero moments. Uses Inter for the base and
   Montserrat italic for the emphasis word (the "highlighter" move).
   For poster-style moments, use .t-feature instead. */
.t-display {
  font-family: var(--font-sans);
  font-size: clamp(40px, 7vw, 96px);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  font-weight: 600;
  color: var(--fg-1);
}
.t-display em,
.t-display .ital {
  font-family: var(--font-secondary);
  font-style: italic;
  font-weight: 500;
  letter-spacing: -0.01em;
  color: var(--fg-accent);
}

/* Feature — Special Gothic Expanded One. Used for big moments:
   poster-style headings, merch, section dividers in marketing.
   Always uppercase or sentence-case; never mid-sentence. */
.t-feature {
  font-family: var(--font-display);
  font-weight: 400;
  font-size: clamp(40px, 6vw, 80px);
  line-height: 0.95;
  letter-spacing: -0.01em;
  text-transform: uppercase;
  color: var(--fg-1);
}

/* Headlines */
h1, .t-h1 {
  font-family: var(--font-sans);
  font-size: var(--fs-4xl);
  line-height: var(--lh-tight);
  letter-spacing: var(--tracking-tight);
  font-weight: 500;
  color: var(--fg-1);
}
h2, .t-h2 {
  font-family: var(--font-sans);
  font-size: var(--fs-3xl);
  line-height: 1.1;
  letter-spacing: var(--tracking-tight);
  font-weight: 500;
  color: var(--fg-1);
}
h3, .t-h3 {
  font-family: var(--font-sans);
  font-size: var(--fs-2xl);
  line-height: 1.15;
  letter-spacing: -0.01em;
  font-weight: 500;
  color: var(--fg-1);
}
h4, .t-h4 {
  font-family: var(--font-sans);
  font-size: var(--fs-xl);
  line-height: var(--lh-snug);
  font-weight: 500;
  color: var(--fg-1);
}

/* Body */
p, .t-body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-normal);
  color: var(--fg-1);
}
.t-body-lg {
  font-size: var(--fs-lg);
  line-height: var(--lh-relaxed);
}
.t-body-sm {
  font-size: var(--fs-sm);
  line-height: var(--lh-normal);
  color: var(--fg-2);
}

/* Caption / meta */
.t-caption {
  font-family: var(--font-sans);
  font-size: var(--fs-xs);
  line-height: 1.3;
  color: var(--fg-3);
}

/* Mono label — classic Team small-caps-feel overline.
   Used for section labels, timestamps, tags, footnotes. */
.t-mono,
.t-label {
  font-family: var(--font-mono);
  font-size: var(--fs-xs);
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-2);
}
.t-mono-sm {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-3);
}

/* Italic pull — inline editorial accent using Instrument Serif Italic.
   This is THE "highlighter" move from the Myth vs Machine series.
   Pick ONE word per headline and italicize it.
   e.g. <span class="t-ital">really</span>
   Color is usually lime on dark, or keeps inherited color on light. */
.t-ital {
  font-family: var(--font-highlight);
  font-style: italic;
  font-weight: 400;
  letter-spacing: -0.005em;
}

/* Code / data */
code, .t-code {
  font-family: var(--font-mono);
  font-size: 0.92em;
  background: var(--bg-inset);
  border: 1px solid var(--border-hair);
  padding: 0.1em 0.4em;
  border-radius: var(--radius-xs);
  color: var(--fg-1);
}

/* Memory Graph — layout chrome only. Graph itself is inline SVG from React. */

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  background: var(--ink-900);
  color: var(--fg-1);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
}

.shell {
  position: fixed; inset: 0;
  display: grid;
  grid-template-rows: auto 1fr auto;
}

/* ---------- Top chrome ---------- */
.topbar {
  display: flex; align-items: center; gap: var(--space-3);
  padding: var(--space-4) var(--space-5);
  z-index: 20;
  position: relative;
}
.search {
  display: flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-pill);
  padding: 8px 14px 8px 12px;
  width: 240px;
  font-size: 13px;
  color: var(--fg-2);
}
.search svg { flex: none; opacity: 0.6; }
.search input {
  flex: 1; background: transparent; border: 0; outline: 0;
  color: var(--fg-1); font-family: var(--font-sans); font-size: 13px;
}
.search input::placeholder { color: var(--fg-3); }

.count-pill {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 12px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-pill);
  font-size: 12px;
  color: var(--fg-1);
  cursor: default;
  transition: background var(--dur-fast) var(--ease-out);
}
.count-pill:hover { background: rgba(255,255,255,0.07); }
.count-pill .dot { width: 8px; height: 8px; border-radius: 50%; }
.count-pill .num {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-mono);
  color: var(--fg-2);
}
.count-pill.active { background: rgba(192,236,95,0.08); border-color: rgba(192,236,95,0.25); }
.count-pill.active .num { color: var(--lime-500); }

.spacer { flex: 1; }

.close-btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 7px 14px;
  background: transparent;
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-pill);
  color: var(--fg-2);
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
}
.close-btn:hover { color: var(--fg-1); border-color: var(--border-default); }

/* ---------- Stage ---------- */
.stage {
  position: relative;
  overflow: hidden;
  cursor: grab;
}
.stage.dragging { cursor: grabbing; }
.stage svg { display: block; width: 100%; height: 100%; }

/* Ambient glow behind the graph — very subtle, no gradient slop */
.stage::before {
  content: '';
  position: absolute;
  left: 50%; top: 50%;
  width: 900px; height: 900px;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(192,236,95,0.035) 0%, transparent 55%);
  pointer-events: none;
}

/* ---------- Floating side panel ---------- */
.insight-panel {
  position: absolute;
  top: 76px;
  right: 20px;
  width: 320px;
  max-height: calc(100vh - 180px);
  overflow-y: auto;
  background: rgba(23,23,26,0.72);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border: 1px solid var(--border-default);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
  z-index: 15;
  opacity: 0;
  transform: translateY(-8px);
  pointer-events: none;
  transition: opacity var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
}
.insight-panel.visible { opacity: 1; transform: translateY(0); pointer-events: auto; }
.insight-panel::-webkit-scrollbar { width: 4px; }
.insight-panel::-webkit-scrollbar-thumb { background: var(--ink-500); border-radius: 2px; }

.insight-panel .label-row {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: var(--space-3);
}
.insight-panel .cat-dot { width: 8px; height: 8px; border-radius: 50%; }
.insight-panel .cat-label {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-2);
}
.insight-panel h3 {
  font-size: 22px; font-weight: 500; margin: 0 0 var(--space-2);
  line-height: 1.15;
  letter-spacing: -0.01em;
}
.insight-panel h3 .ital {
  font-family: var(--font-highlight);
  font-style: italic;
  color: var(--lime-500);
  font-weight: 400;
  letter-spacing: -0.005em;
}
.insight-panel .meta {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-3);
  margin-bottom: var(--space-4);
}
.insight-panel .section {
  margin-top: var(--space-4);
  padding-top: var(--space-4);
  border-top: 1px solid var(--border-hair);
}
.insight-panel .section .sec-label {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-3);
  margin-bottom: var(--space-2);
}
.insight-panel .cross-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border-hair);
  font-size: 13px;
  line-height: 1.4;
}
.insight-panel .cross-item:last-child { border-bottom: 0; }
.insight-panel .cross-item .tag {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-3);
  padding: 2px 7px;
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-xs);
  flex: none;
  margin-top: 1px;
}
.insight-panel .reason {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--fg-1);
}
.insight-panel .reason .ital {
  font-family: var(--font-highlight);
  font-style: italic;
  color: var(--lime-500);
}

/* ---------- Intro card (top-left) ---------- */
.intro-card {
  position: absolute;
  top: 76px;
  left: 20px;
  max-width: 340px;
  padding: var(--space-5);
  background: rgba(23,23,26,0.5);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-lg);
  z-index: 14;
}
.intro-card .eyebrow {
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--lime-500);
  margin-bottom: var(--space-3);
}
.intro-card h1 {
  font-size: 28px;
  font-weight: 500;
  line-height: 1.1;
  letter-spacing: -0.015em;
  margin: 0 0 var(--space-3);
}
.intro-card h1 .ital {
  font-family: var(--font-highlight);
  font-style: italic;
  color: var(--lime-500);
  font-weight: 400;
}
.intro-card p {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--fg-2);
  margin: 0 0 var(--space-3);
}
.intro-card .hints {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: var(--space-3);
  padding-top: var(--space-3);
  border-top: 1px solid var(--border-hair);
}
.intro-card .hint {
  font-family: var(--font-mono);
  font-size: 10px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-3);
  padding: 4px 8px;
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-xs);
}
.intro-card .hint kbd {
  font-family: var(--font-mono);
  color: var(--fg-1);
  background: rgba(255,255,255,0.06);
  padding: 1px 4px;
  border-radius: 3px;
  margin: 0 2px;
}

/* ---------- Status ticker (bottom-right, above legend) ---------- */
.ticker {
  position: absolute;
  right: 20px;
  bottom: 72px;
  z-index: 14;
  display: flex; flex-direction: column; gap: 4px;
  align-items: flex-end;
  pointer-events: none;
}
.ticker-item {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(23,23,26,0.72);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid var(--border-hair);
  border-radius: var(--radius-pill);
  padding: 6px 12px 6px 10px;
  font-family: var(--font-mono);
  font-size: 11px;
  letter-spacing: var(--tracking-mono);
  text-transform: uppercase;
  color: var(--fg-2);
  animation: tickerIn 300ms var(--ease-out);
}
.ticker-item .cat-dot { width: 7px; height: 7px; border-radius: 50%; }
.ticker-item .tick-dim { color: var(--fg-3); }
@keyframes tickerIn {
  from { opacity: 0; transform: translateX(12px); }
  to   { opacity: 1; transform: translateX(0); }
}

/* ---------- Legend ---------- */
.legend {
  display: flex; align-items: center; gap: var(--space-2);
  padding: var(--space-4) var(--space-5);
  flex-wrap: wrap;
  z-index: 20;
  position: relative;
}
.legend-chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 5px 11px 5px 10px;
  background: transparent;
  border: 1px solid transparent;
  border-radius: var(--radius-pill);
  font-size: 12px;
  color: var(--fg-2);
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all var(--dur-fast) var(--ease-out);
  user-select: none;
}
.legend-chip:hover { background: rgba(255,255,255,0.04); color: var(--fg-1); }
.legend-chip.active {
  background: rgba(255,255,255,0.06);
  border-color: var(--border-hair);
  color: var(--fg-1);
}
.legend-chip.all {
  background: var(--paper-100);
  color: var(--ink-900);
  font-weight: 500;
}
.legend-chip.all:hover { background: var(--paper-100); }
.legend-chip.muted { opacity: 0.35; }
.legend-chip .dot { width: 8px; height: 8px; border-radius: 50%; }
.legend-chip .num {
  font-family: var(--font-mono);
  font-size: 10.5px;
  letter-spacing: var(--tracking-mono);
  color: var(--fg-3);
  margin-left: 1px;
}
.legend-chip.all .num { color: var(--ink-500); }

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script>
// Graph data + geometry helpers
// Entity taxonomy follows the screenshot's legend but recolors to Team's palette.
// No rainbow — lime is the accent (observations), ember for high-signal nodes
// (campaigns/decisions), everything else neutral greys.

const CATEGORIES = {
  contact:       { label: 'contact',       count: 48,    color: '#B8B6AE', size: 0.55 },
  task:          { label: 'task',          count: 151,   color: '#7A7770', size: 0.40 },
  tactic:        { label: 'tactic',        count: 57,    color: '#FAFAF7', size: 0.60 },
  campaign:      { label: 'campaign',      count: 4,     color: '#E83E18', size: 1.20 }, // ember — hero
  observations:  { label: 'observations',  count: 10077, color: '#C0EC5F', size: 0.35 }, // lime — most numerous, smallest
  decisions:     { label: 'decisions',     count: 131,   color: '#F4833E', size: 0.85 }, // ember-400
  workflows:     { label: 'workflows',     count: 17,    color: '#CAEC73', size: 0.95 }, // lime-300
  conversations: { label: 'conversations', count: 82,    color: '#8A8A94', size: 0.50 },
};

// Deterministic pseudo-random so the graph is stable across reloads.
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Build ~420 nodes distributed on/inside a sphere. The screenshot has
// a shell of small dots and larger hubs deeper in — we replicate that:
//   - 6 hero hubs (campaigns/decisions) at small radius
//   - mid-layer of workflows, tactics, contacts, conversations
//   - outer shell of tasks + observations (the tiny dots)
function buildGraph() {
  const rand = mulberry32(7);
  const nodes = [];
  let id = 0;

  // Distribute points on a sphere (fibonacci lattice) so the outer shell
  // reads as a clean sphere, not a cloud.
  function fibSphere(n, radius, offset = 0) {
    const pts = [];
    const phi = Math.PI * (3 - Math.sqrt(5));
    for (let i = 0; i < n; i++) {
      const y = 1 - (i / (n - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = phi * (i + offset);
      pts.push([Math.cos(theta) * r * radius, y * radius, Math.sin(theta) * r * radius]);
    }
    return pts;
  }

  // Hero hubs — campaigns (big violet/ember in screenshot; we use ember here)
  const hubs = [
    ...fibSphere(4, 90, 0).map(p => ({ cat: 'campaign', p })),
    ...fibSphere(5, 120, 0.5).map(p => ({ cat: 'decisions', p, big: true })),
  ];
  hubs.forEach(h => {
    nodes.push({
      id: id++, cat: h.cat,
      x: h.p[0] + (rand() - 0.5) * 20,
      y: h.p[1] + (rand() - 0.5) * 20,
      z: h.p[2] + (rand() - 0.5) * 20,
      r: CATEGORIES[h.cat].size * (h.big ? 1 : 1.15),
      hub: true,
    });
  });

  // Mid-layer
  const midConfig = [
    { cat: 'workflows',     count: 17,  radius: 160 },
    { cat: 'tactic',        count: 57,  radius: 180 },
    { cat: 'contact',       count: 48,  radius: 200 },
    { cat: 'conversations', count: 82,  radius: 210 },
    { cat: 'decisions',     count: 26,  radius: 150 },
  ];
  midConfig.forEach((cfg, idx) => {
    const pts = fibSphere(cfg.count, cfg.radius, idx * 0.37);
    pts.forEach(p => {
      nodes.push({
        id: id++, cat: cfg.cat,
        x: p[0] + (rand() - 0.5) * 18,
        y: p[1] + (rand() - 0.5) * 18,
        z: p[2] + (rand() - 0.5) * 18,
        r: CATEGORIES[cfg.cat].size,
        hub: false,
      });
    });
  });

  // Outer shell — tasks + a sampling of observations (screenshot shows
  // mostly the outer dots, implying observations are sampled in here).
  const outerConfig = [
    { cat: 'task',         count: 90,  radius: 270 },
    { cat: 'observations', count: 180, radius: 290 },
    { cat: 'observations', count: 60,  radius: 310 },
  ];
  outerConfig.forEach((cfg, idx) => {
    const pts = fibSphere(cfg.count, cfg.radius, idx * 0.19 + 0.1);
    pts.forEach(p => {
      nodes.push({
        id: id++, cat: cfg.cat,
        x: p[0] + (rand() - 0.5) * 12,
        y: p[1] + (rand() - 0.5) * 12,
        z: p[2] + (rand() - 0.5) * 12,
        r: CATEGORIES[cfg.cat].size,
        hub: false,
      });
    });
  });

  // Edges: hubs connect densely to a subset of everything; mid nodes
  // connect to their nearest hub + 1-2 peers; outer nodes to 1 nearest mid.
  const edges = [];
  const hubIds = nodes.filter(n => n.hub).map(n => n.id);

  function dist(a, b) {
    const dx = a.x - b.x, dy = a.y - b.y, dz = a.z - b.z;
    return Math.sqrt(dx * dx + dy * dy + dz * dz);
  }

  // Hub <-> hub (every pair)
  for (let i = 0; i < hubIds.length; i++) {
    for (let j = i + 1; j < hubIds.length; j++) {
      edges.push({ a: hubIds[i], b: hubIds[j], strong: true });
    }
  }

  // Each non-hub node → 1 nearest hub + (sometimes) a peer
  nodes.forEach(n => {
    if (n.hub) return;
    let best = null, bestD = Infinity;
    hubIds.forEach(hid => {
      const d = dist(n, nodes[hid]);
      if (d < bestD) { bestD = d; best = hid; }
    });
    if (best != null) edges.push({ a: n.id, b: best, strong: false });

    if (rand() < 0.22) {
      // peer connect to a similar-radius random neighbor
      const peer = nodes[Math.floor(rand() * nodes.length)];
      if (peer.id !== n.id) edges.push({ a: n.id, b: peer.id, strong: false });
    }
  });

  return { nodes, edges };
}

window.CATEGORIES = CATEGORIES;
window.buildGraph = buildGraph;

</script>

// ---------- Main ----------
function App() {
  const graph = useMemo(() => buildGraph(), []);
  const stageRef = useRef(null);
  const [size, setSize] = useState({ w: 1000, h: 700 });
  const [yaw, setYaw] = useState(-0.6);
  const [pitch, setPitch] = useState(0.12);
  const [zoom, setZoom] = useState(1);
  const [rotating, setRotating] = useState(true);
  const [playing, setPlaying] = useState(true); // memory-ingestion pulses
  const [hovered, setHovered] = useState(null);
  const [focused, setFocused] = useState(null); // id of hub node whose story is shown
  const [filter, setFilter] = useState('all'); // category or 'all'
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [density, setDensity] = useState(1);      // 0.4 .. 1.3
  const [showLines, setShowLines] = useState(true);
  const [showIntro, setShowIntro] = useState(true);
  const [ticker, setTicker] = useState([]);        // memory ingestion feed
  const [showStroryStep, setStoryStep] = useState(0);
  const [search, setSearch] = useState('');

  // Tweakable defaults block — scanned + rewritten by the host on save
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/ {
    "rotationSpeed": 0.8,
    "layout": "sphere",
    "showLines": true,
    "density": 1
  } /*EDITMODE-END*/;
  const [rotSpeed, setRotSpeed] = useState(TWEAK_DEFAULTS.rotationSpeed);
  const [layout, setLayout] = useState(TWEAK_DEFAULTS.layout);

  // ---------- Resize ----------
  useEffect(() => {
    const handle = () => {
      if (!stageRef.current) return;
      const r = stageRef.current.getBoundingClientRect();
      setSize({ w: r.width, h: r.height });
    };
    handle();
    window.addEventListener('resize', handle);
    // Also observe the stage element directly. Iframe parents resize the
    // iframe (mobile rotate, content-visibility re-render, layout reflow)
    // without always firing window.resize on the content window — without
    // this observer the graph can stay centered on a stale desktop width
    // and end up clipped to one side on mobile.
    let ro = null;
    if (typeof ResizeObserver !== 'undefined' && stageRef.current) {
      ro = new ResizeObserver(handle);
      ro.observe(stageRef.current);
    }
    return () => {
      window.removeEventListener('resize', handle);
      if (ro) ro.disconnect();
    };
  }, []);

  // ---------- Auto-rotate ----------
  useEffect(() => {
    if (!rotating) return;
    let raf, last = performance.now();
    const tick = (t) => {
      const dt = (t - last) / 1000; last = t;
      setYaw(y => y + dt * 0.25 * rotSpeed);
      setPitch(p => p + Math.sin(t / 6200) * 0.0004 * rotSpeed);
      raf = requestAnimationFrame(tick);
    };
    raf = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(raf);
  }, [rotating, rotSpeed]);

  // ---------- Drag to spin ----------
  const dragState = useRef({ active: false, x: 0, y: 0 });
  const onPointerDown = (e) => {
    dragState.current = { active: true, x: e.clientX, y: e.clientY };
    setRotating(false);
    e.currentTarget.setPointerCapture?.(e.pointerId);
    e.currentTarget.classList.add('dragging');
  };
  const onPointerMove = (e) => {
    if (!dragState.current.active) return;
    const dx = e.clientX - dragState.current.x;
    const dy = e.clientY - dragState.current.y;
    dragState.current.x = e.clientX;
    dragState.current.y = e.clientY;
    setYaw(y => y + dx * 0.006);
    setPitch(p => Math.max(-1.2, Math.min(1.2, p + dy * 0.005)));
  };
  const onPointerUp = (e) => {
    dragState.current.active = false;
    e.currentTarget.classList.remove('dragging');
  };
  const onWheel = (e) => {
    e.preventDefault();
    setZoom(z => Math.max(0.55, Math.min(2.2, z - e.deltaY * 0.0012)));
  };

  // ---------- Memory ingestion ticker ----------
  useEffect(() => {
    if (!playing) return;
    const sources = [
      { cat: 'observations',  text: 'TikTok teaser saves +2.1×',         dim: '14s ago' },
      { cat: 'conversations', text: 'Discord — superfan AMA RSVP spike', dim: '22s ago' },
      { cat: 'task',          text: 'Lyric Hunt fragment 4 approved',    dim: '38s ago' },
      { cat: 'observations',  text: 'Pre-save spike — Discord cohort',   dim: '1m ago' },
      { cat: 'decisions',     text: 'Lead with fan engagement — locked', dim: '3m ago' },
      { cat: 'tactic',        text: 'Twitch listening party scheduled',  dim: '5m ago' },
      { cat: 'observations',  text: 'Superfan DM open rate 78%',         dim: '7m ago' },
      { cat: 'workflows',     text: 'Scavenger hunt step 4 auto-ran',    dim: '9m ago' },
    ];
    let i = Math.floor(Math.random() * sources.length);
    const push = () => {
      setTicker(prev => [sources[i % sources.length], ...prev].slice(0, 3));
      i++;
    };
    push();
    const iv = setInterval(push, 2600);
    return () => clearInterval(iv);
  }, [playing]);

  // ---------- Rotate/project nodes for current frame ----------
  const projected = useMemo(() => {
    const cy = Math.cos(yaw), sy = Math.sin(yaw);
    const cp = Math.cos(pitch), sp = Math.sin(pitch);
    const cx = size.w / 2, cyy = size.h / 2;
    const perspective = 900;
    const scale = Math.min(size.w, size.h) * 0.9 * zoom / 700;

    return graph.nodes.map(n => {
      // apply density scale around origin
      const x0 = n.x * density, y0 = n.y * density, z0 = n.z * density;
      // yaw around Y
      const x1 = x0 * cy + z0 * sy;
      const z1 = -x0 * sy + z0 * cy;
      // pitch around X
      const y2 = y0 * cp - z1 * sp;
      const z2 = y0 * sp + z1 * cp;
      // perspective project
      const depthFactor = perspective / (perspective + z2);
      const sx = cx + x1 * scale * depthFactor;
      const sy2 = cyy + y2 * scale * depthFactor;
      // front→back = higher z = farther (we've rotated so +z is away)
      const depth = z2; // for sorting and fading
      return { ...n, sx, sy: sy2, depth, depthFactor };
    });
  }, [graph, yaw, pitch, zoom, density, size.w, size.h]);

  const nodeById = useMemo(() => {
    const m = new Map();
    projected.forEach(n => m.set(n.id, n));
    return m;
  }, [projected]);

  // ---------- Filter & search dimming ----------
  const q = search.trim().toLowerCase();
  const isDim = (n) => {
    if (filter !== 'all' && n.cat !== filter) return true;
    if (q && !n.cat.includes(q)) return true;
    return false;
  };

  // ---------- Sort nodes back-to-front ----------
  const sortedNodes = useMemo(
    () => [...projected].sort((a, b) => b.depth - a.depth),
    [projected]
  );

  // Depth range for fade
  const [dMin, dMax] = useMemo(() => {
    let mn = Infinity, mx = -Infinity;
    projected.forEach(n => { if (n.depth < mn) mn = n.depth; if (n.depth > mx) mx = n.depth; });
    return [mn, mx];
  }, [projected]);
  const fadeForDepth = (d) => {
    const t = (d - dMin) / (dMax - dMin + 1e-6);
    // front bright, back dim
    return 1 - t * 0.75;
  };

  // ---------- Focused story (click a hub) ----------
  const focusedNode = focused != null ? nodeById.get(focused) : null;
  const focusedStory = focusedNode ? HUB_STORIES.find(s => s.cat === focusedNode.cat) || HUB_STORIES[0] : null;

  // Auto-cycle a showcase story every so often so the page feels alive
  useEffect(() => {
    if (focused != null || !playing) return;
    const hubs = graph.nodes.filter(n => n.hub);
    let i = 0;
    const pick = () => {
      setStoryStep(s => s + 1);
    };
    const iv = setInterval(pick, 5200);
    return () => clearInterval(iv);
  }, [focused, playing, graph]);

  const autoStoryCat = HUB_STORIES[showStroryStep % HUB_STORIES.length].cat;
  const autoStoryHub = useMemo(() => {
    return graph.nodes.find(n => n.hub && n.cat === autoStoryCat)
        || graph.nodes.find(n => n.hub);
  }, [autoStoryCat, graph]);
  const activeStory = focusedStory || HUB_STORIES[showStroryStep % HUB_STORIES.length];
  const activeHubId = focused != null ? focused : autoStoryHub?.id;
  const activeHubProjected = activeHubId != null ? nodeById.get(activeHubId) : null;

  // ---------- Which edges to render ----------
  // Too many edges kill perf/clarity. Render all hub-hub edges, plus edges
  // touching the active hub + a thinned sample of the rest.
  const visibleEdges = useMemo(() => {
    const out = [];
    graph.edges.forEach((e, idx) => {
      const isActive = e.a === activeHubId || e.b === activeHubId;
      if (e.strong || isActive || idx % 3 === 0) {
        out.push({ ...e, active: isActive });
      }
    });
    return out;
  }, [graph.edges, activeHubId]);

  // ---------- Edit-mode protocol ----------
  useEffect(() => {
    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);
  const persist = (edits) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  };

  // ---------- Label position for tooltip ----------
  const hoveredNode = hovered != null ? nodeById.get(hovered) : null;

  // ---------- Render ----------
  return (
    <div className="shell">
      {/* Top bar */}
      <div className="topbar">
        <div className="search">
          <IconSearch/>
          <input
            placeholder="Search entities…"
            value={search}
            onChange={e => setSearch(e.target.value)}
          />
        </div>
        <div className="count-pill"><IconEntity/><span>Entities</span><span className="num">1,284</span></div>
        <div className="count-pill"><IconLink/><span>Relations</span><span className="num">251</span></div>
        <div className="count-pill active"><IconMemory/><span>Memories</span><span className="num">2,884</span></div>

        <div className="spacer"/>
        <button className="close-btn" onClick={() => {}}><IconClose/> Close</button>
      </div>

      {/* Stage */}
      <div
        className="stage"
        ref={stageRef}
        onPointerDown={onPointerDown}
        onPointerMove={onPointerMove}
        onPointerUp={onPointerUp}
        onPointerCancel={onPointerUp}
        onWheel={onWheel}
      >
        {/* Intro card */}
        {showIntro && (
          <div className="intro-card">
            <div className="eyebrow">※ Team memory graph</div>
            <h1>Every rollout builds a <span className="ital">brain</span>.</h1>
            <p>Each contact, task, observation, and decision becomes a memory. teammate cross-references them to derive strategy, catch regressions, and flag what's next.</p>
            <div className="hints">
              <span className="hint">Drag to spin</span>
              <span className="hint"><kbd>scroll</kbd> zoom</span>
              <span className="hint">Click a hub</span>
            </div>
          </div>
        )}

        {/* Stage controls */}
        <div className="stage-controls">
          <button className={`control-btn ${rotating ? 'on' : ''}`} title="Auto-rotate"
                  onClick={() => setRotating(r => !r)}>
            <IconRotate/>
          </button>
          <button className={`control-btn play-btn ${playing ? 'on' : ''}`} title="Live ingestion"
                  onClick={() => setPlaying(p => !p)}>
            {playing ? <IconPause/> : <IconPlay/>}
          </button>
          <button className={`control-btn ${tweaksOpen ? 'on' : ''}`} title="Tweaks"
                  onClick={() => setTweaksOpen(t => !t)}>
            <IconSliders/>
          </button>
        </div>

        {/* SVG graph */}
        <svg viewBox={`0 0 ${size.w} ${size.h}`} preserveAspectRatio="xMidYMid meet">
          <defs>
            <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
              <stop offset="0%"  stopColor="#fff" stopOpacity="0.85"/>
              <stop offset="70%" stopColor="#fff" stopOpacity="0"/>
            </radialGradient>
            <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
              <feGaussianBlur stdDeviation="2" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
          </defs>

          {/* Edges */}
          {showLines && visibleEdges.map((e, i) => {
            const a = nodeById.get(e.a), b = nodeById.get(e.b);
            if (!a || !b) return null;
            const adim = isDim(a), bdim = isDim(b);
            const anyDim = adim || bdim;
            const avgDepth = (a.depth + b.depth) / 2;
            const fade = fadeForDepth(avgDepth);

            let stroke, opacity, width;
            if (e.active) {
              stroke = 'var(--lime-500)';
              opacity = 0.55 * fade;
              width = 1.1;
            } else if (e.strong) {
              stroke = '#ffffff';
              opacity = 0.22 * fade * (anyDim ? 0.25 : 1);
              width = 0.9;
            } else {
              stroke = '#ffffff';
              opacity = 0.07 * fade * (anyDim ? 0.2 : 1);
              width = 0.6;
            }
            return (
              <line
                key={i}
                x1={a.sx} y1={a.sy} x2={b.sx} y2={b.sy}
                stroke={stroke} strokeOpacity={opacity} strokeWidth={width}
              />
            );
          })}

          {/* Animated energy pulse along active hub's edges */}
          {activeHubProjected && showLines && visibleEdges
            .filter(e => e.active)
            .slice(0, 18)
            .map((e, i) => {
              const a = nodeById.get(e.a), b = nodeById.get(e.b);
              if (!a || !b) return null;
              const other = a.id === activeHubId ? b : a;
              return (
                <circle key={`p-${i}`} r="1.8" fill="var(--lime-500)">
                  <animate
                    attributeName="cx"
                    dur={`${2 + (i % 4) * 0.4}s`}
                    repeatCount="indefinite"
                    values={`${activeHubProjected.sx};${other.sx}`}
                    begin={`${(i * 0.11) % 1.5}s`}
                  />
                  <animate
                    attributeName="cy"
                    dur={`${2 + (i % 4) * 0.4}s`}
                    repeatCount="indefinite"
                    values={`${activeHubProjected.sy};${other.sy}`}
                    begin={`${(i * 0.11) % 1.5}s`}
                  />
                  <animate
                    attributeName="opacity"
                    dur={`${2 + (i % 4) * 0.4}s`}
                    repeatCount="indefinite"
                    values="0;1;0"
                    begin={`${(i * 0.11) % 1.5}s`}
                  />
                </circle>
              );
            })}

          {/* Nodes, back-to-front */}
          {sortedNodes.map(n => {
            const cat = CATEGORIES[n.cat];
            const dim = isDim(n);
            const fade = fadeForDepth(n.depth);
            const r = Math.max(1.2, 3.5 * n.r * n.depthFactor);
            const isHoveredN = hovered === n.id;
            const isActiveN  = activeHubId === n.id;
            const baseOpacity = (dim ? 0.12 : 1) * fade;

            return (
              <g key={n.id} style={{ cursor: n.hub ? 'pointer' : 'default' }}>
                {/* outer glow for hubs */}
                {n.hub && !dim && (
                  <circle cx={n.sx} cy={n.sy} r={r * 3}
                          fill={cat.color} opacity={0.12 * fade}/>
                )}
                {/* pulse ring on active hub */}
                {isActiveN && (
                  <circle cx={n.sx} cy={n.sy} r={r * 1.4}
                          fill="none"
                          stroke="var(--lime-500)"
                          strokeWidth="1"
                          className="hub-pulse"
                          opacity="0.7"/>
                )}
                <circle
                  cx={n.sx} cy={n.sy}
                  r={isHoveredN ? r * 1.4 : r}
                  fill={cat.color}
                  opacity={baseOpacity}
                  onMouseEnter={() => setHovered(n.id)}
                  onMouseLeave={() => setHovered(h => h === n.id ? null : h)}
                  onClick={() => { if (n.hub) setFocused(n.id); }}
                  style={{ pointerEvents: 'auto', transition: 'r 120ms var(--ease-out)' }}
                />
                {/* Highlight ring for active hub */}
                {isActiveN && (
                  <circle cx={n.sx} cy={n.sy} r={r * 1.15}
                          fill="none" stroke="#fff" strokeWidth="1.2"
                          opacity={0.9 * fade}/>
                )}
              </g>
            );
          })}
        </svg>

        {/* Hover tooltip */}
        {hoveredNode && (
          <div className="node-label"
               style={{ left: hoveredNode.sx, top: hoveredNode.sy }}>
            <span className="cat-dot" style={{ background: CATEGORIES[hoveredNode.cat].color }}/>
            <span>{hoveredNode.cat}</span>
            {hoveredNode.hub && <span className="nl-cat">· hub</span>}
          </div>
        )}

        {/* Ticker */}
        <div className="ticker">
          {ticker.map((t, i) => (
            <div key={`${t.text}-${i}`} className="ticker-item" style={{ opacity: 1 - i * 0.28 }}>
              <span className="cat-dot" style={{ background: CATEGORIES[t.cat].color }}/>
              <span>{t.text}</span>
              <span className="tick-dim">· {t.dim}</span>
            </div>
          ))}
        </div>

        {/* Insight panel */}
        <div className={`insight-panel ${activeStory ? 'visible' : ''}`}>
          {activeStory && (
            <>
              <div className="label-row">
                <span className="cat-dot" style={{ background: CATEGORIES[activeStory.cat].color }}/>
                <span className="cat-label">{activeStory.cat} · intelligence</span>
              </div>
              <h3>{activeStory.title.map((p, i) => typeof p === 'string' ? p : <span className="ital" key={i}>{p.ital}</span>)}</h3>
              <div className="meta">{activeStory.meta}</div>

              <div className="section">
                <div className="sec-label">※ teammate's reasoning</div>
                <div className="reason">
                  {activeStory.reason.map((p, i) => typeof p === 'string' ? p : <span className="ital" key={i}>{p.ital}</span>)}
                </div>
              </div>

              <div className="section">
                <div className="sec-label">Cross-release references</div>
                {activeStory.cross.map((c, i) => (
                  <div className="cross-item" key={i}>
                    <span className="tag">{c.tag}</span>
                    <span>{c.text}</span>
                  </div>
                ))}
              </div>

              {focused != null && (
                <div className="section" style={{display:'flex',justifyContent:'flex-end'}}>
                  <button className="close-btn" onClick={() => setFocused(null)}>
                    <IconClose/> Unpin
                  </button>
                </div>
              )}
            </>
          )}
        </div>

        {/* Brand corner */}
        <div className="brand">
          <span style={{display:'inline-block',width:18,height:18,borderRadius:4,background:'linear-gradient(90deg,#3B0F08 0%,#8C1F13 20%,#E83E18 40%,#F25A22 55%,#F4833E 70%,#F2A56B 85%,#E8C4A0 100%)'}}/>
          <span className="sep"/>
          <span className="crumb">Memory graph · 3shades — Late Reply</span>
        </div>

        {/* Tweaks */}
        <div className={`tweaks ${tweaksOpen ? 'open' : ''}`}>
          <div className="tweaks-label">※ Tweaks</div>
          <div className="tweak-row">
            <label>Rotation</label>
            <div className="seg">
              {[0, 0.4, 0.8, 1.4].map(s => (
                <button key={s}
                        className={rotSpeed === s ? 'active' : ''}
                        onClick={() => { setRotSpeed(s); persist({ rotationSpeed: s }); setRotating(s > 0); }}>
                  {s === 0 ? 'off' : s === 0.4 ? 'slow' : s === 0.8 ? 'med' : 'fast'}
                </button>
              ))}
            </div>
          </div>
          <div className="tweak-row">
            <label>Density</label>
            <input type="range" min="0.6" max="1.3" step="0.05"
                   value={density} onChange={e => setDensity(parseFloat(e.target.value))}/>
          </div>
          <div className="tweak-row">
            <label>Lines</label>
            <div className="seg">
              <button className={showLines ? 'active' : ''} onClick={() => { setShowLines(true); persist({ showLines: true }); }}>on</button>
              <button className={!showLines ? 'active' : ''} onClick={() => { setShowLines(false); persist({ showLines: false }); }}>off</button>
            </div>
          </div>
          <div className="tweak-row">
            <label>Intro card</label>
            <div className="seg">
              <button className={showIntro ? 'active' : ''} onClick={() => setShowIntro(true)}>on</button>
              <button className={!showIntro ? 'active' : ''} onClick={() => setShowIntro(false)}>off</button>
            </div>
          </div>
          <div className="tweak-row">
            <label>Zoom</label>
            <input type="range" min="0.6" max="2" step="0.05"
                   value={zoom} onChange={e => setZoom(parseFloat(e.target.value))}/>
          </div>
        </div>
      </div>

      {/* Legend / filter */}
      <div className="legend">
        <button
          className={`legend-chip all ${filter === 'all' ? '' : ''}`}
          onClick={() => setFilter('all')}
        >
          <span>▼ All</span>
        </button>
        {Object.entries(CATEGORIES).map(([key, c]) => {
          const isOn = filter === 'all' || filter === key;
          const isSel = filter === key;
          return (
            <button
              key={key}
              className={`legend-chip ${isSel ? 'active' : ''} ${!isOn ? 'muted' : ''}`}
              onClick={() => setFilter(f => f === key ? 'all' : key)}
            >
              <span className="dot" style={{ background: c.color }}/>
              <span>{c.label}</span>
              <span className="num">({c.count.toLocaleString()})</span>
            </button>
          );
        })}
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>
</body>
</html>
